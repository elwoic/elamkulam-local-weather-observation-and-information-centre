<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELWOIC | Global Administration</title>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; }

body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #f1f5f9;
    overflow: hidden;
}

.header-bar {
    background: #ffffff;
    display: flex;
    align-items: center;
    padding: 0 20px;
    height: 56px;
    border-bottom: 1px solid #e2e8f0;
    gap: 20px;
}

.brand {
    display: flex;
    align-items: center;
    gap: 7px;
    font-weight: 700;
    font-size: 14px;
    color: #0f172a;
    white-space: nowrap;
    flex-shrink: 0;
}

.brand .material-icons {
    font-size: 18px;
    color: #0284c7;
}

.brand-sub {
    font-size: 9px;
    color: #94a3b8;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 1px;
}

.brand-block {
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
}

.divider {
    width: 1px;
    height: 28px;
    background: #e2e8f0;
    flex-shrink: 0;
}

.nav-group {
    display: flex;
    gap: 4px;
    flex: 1;
    flex-wrap: wrap;
}

.nav-btn {
    padding: 5px 10px;
    border: 1px solid #e2e8f0;
    background: transparent;
    color: #475569;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    white-space: nowrap;
}

.nav-btn .material-icons { font-size: 14px; }

.nav-btn:hover {
    background: #f1f5f9;
    border-color: #cbd5e1;
    color: #0f172a;
}

.nav-btn.active {
    background: #0284c7;
    border-color: #0284c7;
    color: #ffffff;
}

.nav-btn.danger {
    color: #dc2626;
    border-color: #fecaca;
}

.nav-btn.danger:hover {
    background: #fef2f2;
    border-color: #fca5a5;
}

.right-strip {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
    margin-left: auto;
}

.status-dots {
    display: flex;
    gap: 8px;
    align-items: center;
}

.dot-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    color: #64748b;
    font-weight: 500;
}

.dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
}

.dot-online { background: #22c55e; }
.dot-warn   { background: #f59e0b; }

#digital-clock {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: #475569;
    font-weight: 600;
}

.subbar {
    background: #f8fafc;
    border-bottom: 1px solid #e2e8f0;
    display: flex;
    align-items: center;
    padding: 0 20px;
    height: 28px;
    gap: 24px;
}

.subbar-metric {
    font-size: 10px;
    color: #94a3b8;
    display: flex;
    gap: 5px;
}

.subbar-metric span {
    color: #334155;
    font-weight: 600;
}

#system-log {
    font-size: 10px;
    color: #94a3b8;
    font-family: monospace;
    margin-left: auto;
}

.admin-link {
    font-size: 10px;
    color: #94a3b8;
}

.admin-link a {
    color: #0284c7;
    text-decoration: none;
}

.admin-link a:hover { text-decoration: underline; }

#content-frame {
    width: 100%;
    height: calc(100vh - 84px);
    border: none;
    background: #f1f5f9;
}

@keyframes warnFlash {
    0%,100% { opacity: 1; }
    50% { opacity: 0.5; }
}
</style>
</head>

<body>

<header class="header-bar">

    <div class="brand-block">
        <div class="brand">
            <span class="material-icons">security</span>
            ELWOIC COMMAND
        </div>
        <div class="brand-sub">Global Control Node v2.05 · Alpha-3</div>
    </div>

    <div class="divider"></div>

    <nav class="nav-group">
        <button class="nav-btn active" onclick="loadPage('administration.html', this)">
            <span class="material-icons">terminal</span> Manual Updates
        </button>
        <button class="nav-btn" onclick="loadPage('contact-status.html', this)">
            <span class="material-icons">radar</span> Contact Status
        </button>
        <button class="nav-btn" onclick="loadPage('popalertadmin.html', this)">
            <span class="material-icons">campaign</span> Pop Alert
        </button>
        <button class="nav-btn" onclick="loadPage('data_login.html', this)">
            <span class="material-icons">storage</span> Data Centre
        </button>
        <button class="nav-btn" onclick="triggerAlert(this)">
            <span class="material-icons">warning</span> Alert Mode
        </button>
        <button class="nav-btn" onclick="location.href='request_admin_login.html'">
            <span class="material-icons">manage_accounts</span> Request Access
        </button>
        <button class="nav-btn danger" onclick="logout()">
            <span class="material-icons">logout</span> Logout
        </button>
    </nav>

    <div class="right-strip">
        <div class="status-dots">
            <div class="dot-item"><div class="dot dot-online"></div> SYS</div>
            <div class="dot-item"><div class="dot dot-online"></div> LINK</div>
            <div class="dot-item"><div class="dot dot-warn"></div> SEC</div>
        </div>
        <div id="digital-clock">00:00:00</div>
    </div>

</header>

<div class="subbar">
    <div class="subbar-metric">CPU <span id="cpu-load">12%</span></div>
    <div class="subbar-metric">NET <span id="net-load">98%</span></div>
    <div class="subbar-metric">DB <span>Online</span></div>
    <div id="system-log">INITIALIZING...</div>
    <div class="admin-link"><a href="request_admin_login.html">Request Admin Access</a></div>
</div>

<iframe id="content-frame" src="administration.html"></iframe>

<script>
function updateClock() {
    document.getElementById('digital-clock').innerText =
        new Date().toLocaleTimeString('en-GB');
}
setInterval(updateClock, 1000);
updateClock();

function loadPage(fileName, btn) {
    document.getElementById('content-frame').src = fileName;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById("system-log").innerText = "→ " + fileName.toUpperCase();
}

const logs = [
    "NODE SYNCED", "SAT LINK ACTIVE", "AQI SENSOR ONLINE",
    "SERVER RESPONSE OK", "ELAMKULAM NODE LOCKED"
];
setInterval(() => {
    document.getElementById("system-log").innerText =
        logs[Math.floor(Math.random() * logs.length)]
        + " · " + new Date().toLocaleTimeString();
}, 4000);

setInterval(() => {
    document.getElementById("cpu-load").innerText = Math.floor(Math.random()*40+10) + "%";
    document.getElementById("net-load").innerText = Math.floor(Math.random()*20+80) + "%";
}, 3000);

function triggerAlert(btn) {
    document.querySelector(".header-bar").style.borderBottom = "1px solid #fca5a5";
    document.querySelector(".header-bar").style.background = "#fff5f5";
    btn.classList.add("active");
    btn.style.background = "#dc2626";
    btn.style.borderColor = "#dc2626";
    btn.style.color = "#fff";
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    apiKey: "AIzaSyBgk0xke17yloKn7IyjBTCz1Sr-2FmDQFY",
    authDomain: "admin-pass.firebaseapp.com",
    databaseURL: "https://admin-pass-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "admin-pass",
    storageBucket: "admin-pass.firebasestorage.app",
    messagingSenderId: "177830174972",

    if (!allowed.includes(user.email)) {

</script>

</body>
</html>
