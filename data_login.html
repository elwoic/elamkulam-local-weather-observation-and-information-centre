<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ELWOIC | Secure Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Merriweather:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --gov-navy: #1a237e;
            --accent-gold: #ffab00;
            --white: #ffffff;
            --bg: #f1f5f9;
            --border: #cbd5e1;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: linear-gradient(135deg, #1a237e 0%, #0d47a1 100%);
        }

        .login-card {
            background: var(--white);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            border-top: 5px solid var(--accent-gold);
            text-align: center;
        }

        .gov-logo-text {
            font-family: 'Merriweather', serif;
            color: var(--gov-navy);
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .sub-text {
            color: #64748b;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 30px;
            display: block;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--gov-navy);
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 6px;
            font-size: 1rem;
            transition: 0.2s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--gov-navy);
            outline: none;
            box-shadow: 0 0 0 4px rgba(26, 35, 126, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--gov-navy);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }

        button:hover { background: #0d47a1; }
        button:disabled { opacity: 0.7; cursor: not-allowed; }

        #err {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
            background: #fff1f2;
            color: #be123c;
            font-size: 0.85rem;
            font-weight: 600;
            display: none;
        }

        .footer-note {
            margin-top: 30px;
            font-size: 0.7rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="gov-logo-text">ELWOIC</div>
    <span class="sub-text">Data Centre Access</span>

    <div class="form-group">
        <label>Official Email</label>
        <input id="email" type="email" placeholder="admin@elwoic.in">
    </div>

    <div class="form-group">
        <label>Passcode</label>
        <input id="password" type="password" placeholder="••••••••">
    </div>

    <button id="loginBtn">Authenticate Access</button>
    
    <div id="err"></div>

    <div class="footer-note">
        Authorized Personnel Only. All access is logged and monitored.<br>
        Government of Kerala • IT Cell
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* Match the Project ID of your Data Centre */
const config = {
    apiKey: "AIzaSyALWX2l-9_6izgvt_JerJjTDbgNc5oT2VQ",
    authDomain: "administration-protal.firebaseapp.com"
};

const app = initializeApp(config, "adminAuthApp");
const auth = getAuth(app);

const loginBtn = document.getElementById("loginBtn");
const errField = document.getElementById("err");

function login() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    if (!email || !password) {
        showError("Authentication credentials required.");
        return;
    }

    errField.style.display = "none";
    loginBtn.disabled = true;
    loginBtn.textContent = "Verifying...";

    signInWithEmailAndPassword(auth, email, password)
        .then(() => {
            window.location.replace("elwoic_data_centre.html");
        })
        .catch(err => {
            loginBtn.disabled = false;
            loginBtn.textContent = "Authenticate Access";
            showError("Access Denied: " + err.code.replace("auth/", "").replace(/-/g, " "));
        });
}

function showError(msg) {
    errField.textContent = msg;
    errField.style.display = "block";
}

loginBtn.addEventListener("click", login);
document.addEventListener("keydown", e => { if (e.key === "Enter") login(); });
</script>

</body>
</html>
