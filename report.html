<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Weather Assistant | ELWOIC</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4faff; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        .topbar { background: #00457C; padding: 15px; color: white; display: flex; justify-content: space-between; align-items: center; }
        .topbar h1 { font-size: 1.2rem; margin: 0; }
        .topbar a { color: white; text-decoration: none; font-size: 0.9rem; border: 1px solid white; padding: 5px 10px; border-radius: 4px; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 15px; line-height: 1.4; font-size: 0.95rem; word-wrap: break-word; }
        .ai { background: #e0f0ff; color: #00315c; align-self: flex-start; border-bottom-left-radius: 2px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .user { background: #0073e6; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .input-area { background: white; padding: 15px; border-top: 1px solid #ddd; display: flex; gap: 10px; }
        input { flex: 1; border: 1px solid #ccc; border-radius: 25px; padding: 12px 20px; outline: none; font-size: 1rem; }
        button { background: #0073e6; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; }
        .success-overlay { position: fixed; inset: 0; background: rgba(0,74,128,0.9); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .success-card { background: white; padding: 30px; border-radius: 20px; text-align: center; max-width: 300px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="topbar">
    <h1>ELWOIC AI Assistant</h1>
    <a href="index.html">Exit</a>
</div>

<div id="chat-box">
    <div class="msg ai">Hello! I am the ELWOIC Weather Assistant. <br><br>What is your <b>Name</b> and <b>Location</b>?</div>
</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Type here..." onkeypress="if(event.key==='Enter') sendMessage()">
    <button onclick="sendMessage()">➔</button>
</div>

<div id="successModal" class="success-overlay hidden">
    <div class="success-card">
        <div style="font-size: 3rem;">✅</div>
        <h3>Report Filed!</h3>
        <p id="refDisplay"></p>
        <button onclick="location.reload()" style="width: auto; border-radius: 5px; padding: 10px 20px; cursor:pointer;">Send Another</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, push, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    // 1. FIREBASE CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyASblrFKqSUK6heHly2Bh95EJ_Gqmx0XVQ",
        databaseURL: "https://report-5d8c0-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "report-5d8c0",
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 2. CHAT HISTORY & WORKER URL
    const WORKER_URL = "https://orange-river-4a09.elwoicelamkulam.workers.dev";
    let chatHistory = [];

    window.sendMessage = async () => {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        input.value = "";

        try {
            // CALL CLOUDFLARE WORKER
            const response = await fetch(WORKER_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text, history: chatHistory })
            });

            if (!response.ok) throw new Error("Worker Error");

            const result = await response.json();
            
            // Extract text from Gemini structure
            const aiResponse = result.candidates[0].content.parts[0].text;

            // Save to local history
            chatHistory.push({ role: "user", parts: [{ text: text }] });
            chatHistory.push({ role: "model", parts: [{ text: aiResponse }] });

            // Check if AI completed the form
            if (aiResponse.includes('"complete": true')) {
                const jsonMatch = aiResponse.match(/\{.*\}/s);
                if (jsonMatch) {
                    const finalData = JSON.parse(jsonMatch[0]);
                    submitToFirebase(finalData.data);
                }
            } else {
                addMessage(aiResponse, 'ai');
            }
        } catch (err) {
            console.error(err);
            addMessage("Sorry, I'm having trouble connecting to my brain. Please try again.", 'ai');
        }
    }

    function addMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `msg ${sender}`;
        div.innerText = text;
        const box = document.getElementById('chat-box');
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    async function submitToFirebase(data) {
        const now = new Date();
        const datePart = now.toISOString().slice(2,10).replace(/-/g, "");
        
        try {
            const counterRef = ref(db, "report_counter");
            const result = await runTransaction(counterRef, v => (v || 0) + 1);
            const humanId = `ELW-${datePart}${String(result.snapshot.val()).padStart(3, "0")}`;

            await push(ref(db, "weather_reports"), {
                ...data,
                humanId: humanId,
                timestamp: Date.now()
            });

            document.getElementById('refDisplay').innerText = "Reference ID: " + humanId;
            document.getElementById('successModal').classList.remove('hidden');
        } catch (e) {
            console.error("Firebase Error", e);
            addMessage("Data saved locally, but failed to reach the database.", "ai");
        }
    }
</script>
</body>
</html>
