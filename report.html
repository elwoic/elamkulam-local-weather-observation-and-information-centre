<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Weather Assistant | ELWOIC</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4faff; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        .topbar { background: #00457C; padding: 15px; color: white; display: flex; justify-content: space-between; align-items: center; }
        .topbar h1 { font-size: 1.2rem; margin: 0; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 15px; line-height: 1.4; font-size: 0.95rem; word-wrap: break-word; }
        .ai { background: #e0f0ff; color: #00315c; align-self: flex-start; border-bottom-left-radius: 2px; }
        #typingIndicator{
opacity:0.7;
font-style:italic;
animation:blink 1.2s infinite;
}

@keyframes blink{
0%{opacity:0.4;}
50%{opacity:1;}
100%{opacity:0.4;}
}

        .user { background: #0073e6; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .input-area { background: white; padding: 15px; border-top: 1px solid #ddd; display: flex; gap: 10px; min-height: 60px; }
        input, select { flex: 1; border: 1px solid #ccc; border-radius: 25px; padding: 12px 20px; outline: none; font-size: 1rem; }
        button { background: #0073e6; color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; }
        .success-overlay { position: fixed; inset: 0; background: rgba(0,74,128,0.9); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .success-card { background: white; padding: 30px; border-radius: 20px; text-align: center; max-width: 300px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="topbar">
    <h1>ELWOIC AI Assistant</h1>
    <a href="index.html" style="color:white; text-decoration:none; border:1px solid white; padding:4px 10px; border-radius:4px;">Exit</a>
</div>

<div id="chat-box"></div>

<div class="input-area" id="inputContainer"></div>

<div id="successModal" class="success-overlay hidden">
    <div class="success-card">
        <div style="font-size: 3rem;">✅</div>
        <h3>Report Filed!</h3>
        <p id="refDisplay"></p>
        <button onclick="location.reload()">Submit Another</button>
<button onclick="location.href='index.html'">Go Home</button>

    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyASblrFKqSUK6heHly2Bh95EJ_Gqmx0XVQ",
  databaseURL: "https://report-5d8c0-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "report-5d8c0",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const WORKER_URL = "https://orange-river-4a09.elwoicelamkulam.workers.dev";
const FORMSPREE_URL = "https://formspree.io/f/xpqqzknw";

let reportData = {
  language:'',
  name:'',
  email:'',
  location:'',
  report_type:'',
  time:'',
  show_on_site:'',
  show_name:'',
  priority:'normal',
  observation:''
};


let currentStep = 0;
let isAIPhase = false;

const steps = [
{
q:{
en:"Please choose your preferred language / ഭാഷ തിരഞ്ഞെടുക്കുക",
ml:"ഭാഷ തിരഞ്ഞെടുക്കുക"
},
type:"buttons",
options:["English","Malayalam"],
field:"language"
},

{
q:{
en:"What is your Name?",
ml:"നിങ്ങളുടെ പേര് എന്താണ്?"
},
field:"name",
type:"text"
},

{
q:{
en:"Please provide your Email ID:",
ml:"നിങ്ങളുടെ ഇമെയിൽ ഐഡി നൽകുക:"
},
field:"email",
type:"text"
},

{
q:{
en:"What is the Location or Ward No?",
ml:"സ്ഥലം അല്ലെങ്കിൽ വാർഡ് നമ്പർ എന്താണ്?"
},
field:"location",
type:"text"
},

{
q:{
en:"Select Report Type:",
ml:"റിപ്പോർട്ട് തരം തിരഞ്ഞെടുക്കുക:"
},
type:"select",
options:["General Information","Rainfall","Flood/Water Level","Storm","Lightning","Road Block/Tree Fall","Other"],
field:"report_type"
},

{
q:{
en:"Time of Event? (Example: 17:00 or Evening)",
ml:"സംഭവിച്ച സമയം? (ഉദാ: 17:00 അല്ലെങ്കിൽ വൈകുന്നേരം)"
},
field:"time",
type:"text"
},

{
q:{
en:"Do you want to show this on our site?",
ml:"ഈ റിപ്പോർട്ട് ഞങ്ങളുടെ സൈറ്റിൽ കാണിക്കണോ?"
},
type:"buttons",
options:["yes","no"],
field:"show_on_site"
},

{
q:{
en:"Show your name publicly?",
ml:"നിങ്ങളുടെ പേര് പൊതുവായി കാണിക്കണോ?"
},
type:"buttons",
options:["yes","no"],
field:"show_name"
}

];


function aiThinking(callback, delay=900){

const box = document.getElementById("chat-box");

const typing = document.createElement("div");
typing.className="msg ai";
typing.id="typingIndicator";
typing.innerHTML =
reportData.language==="Malayalam"
? "AI എഴുതുന്നു..."
: "AI typing...";

box.appendChild(typing);
box.scrollTop = box.scrollHeight;

setTimeout(()=>{
typing.remove();
callback();
},delay);

}

window.handleInput = async function(val){

if(!val || val.trim()==="") return;

addMessage(val,"user");

if(!isAIPhase){

const step = steps[currentStep];
reportData[step.field] = val;

if(step.field==="show_on_site" && val==="yes"){
steps.splice(currentStep+1,0,{
q:{
en:"Mark this report as URGENT?",
ml:"ഈ റിപ്പോർട്ട് അടിയന്തരമാണോ?"
},
type:"buttons",
options:["urgent","normal"],
field:"priority"
});
}


currentStep++;

if(currentStep < steps.length){
showStep();
}else{
startAIPhase();
}

}else{

reportData.observation = val;

aiThinking(()=>{
addMessage("Checking description...", "ai");
},500);


try{

const res = await fetch(WORKER_URL,{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({ text:val })
});

const data = await res.json();

reportData.observation = data.corrected;


showReview();


}catch(e){

addMessage("AI connection error.","ai");

}

}

};
function showReview(){

const review = `
<b>Please review your report:</b><br><br>

Name: ${reportData.name}<br>
Location: ${reportData.location}<br>
Report Type: ${reportData.report_type}<br>
Event Time: ${reportData.time}<br>
Observation:<br>
${reportData.observation}<br><br>

Show on site: ${reportData.show_on_site}<br>
Show name: ${reportData.show_name}<br>
Priority: ${reportData.priority}<br><br>

Submit this report?
`;

aiThinking(()=>{
addMessage(review,"ai");
});


const container = document.getElementById("inputContainer");
container.innerHTML = "";

const yes = document.createElement("button");
yes.innerText="Submit";
yes.onclick=()=>submitToFirebase(reportData);

const no = document.createElement("button");
no.innerText="Edit";
no.onclick=()=>editReport();

container.appendChild(yes);
container.appendChild(no);

}
function editReport(){

addMessage("Which field do you want to edit? (name, location, time, observation)", "ai");

renderInput({type:"text"});

isEditing=true;

}

function showStep(){

const step = steps[currentStep];

const question =
reportData.language==="Malayalam"
? step.q.ml
: step.q.en;

aiThinking(()=>{
addMessage(question,"ai");
renderInput(step);
});

}


function renderInput(step){

const container = document.getElementById("inputContainer");
container.innerHTML="";

if(step.type==="buttons"){

step.options.forEach(opt=>{
const btn=document.createElement("button");
btn.innerText=opt;
btn.onclick=()=>handleInput(opt);
container.appendChild(btn);
});

}else if(step.type==="select"){

const sel=document.createElement("select");
sel.id="stepInput";

step.options.forEach(opt=>{
const o=document.createElement("option");
o.value=opt;
o.text=opt;
sel.appendChild(o);
});

const btn=document.createElement("button");
btn.innerText="➔";
btn.onclick=()=>handleInput(sel.value);

container.appendChild(sel);
container.appendChild(btn);

}else{

container.innerHTML=
`<input id="stepInput" type="text" placeholder="Type here..."
onkeypress="if(event.key==='Enter') handleInput(this.value)">
<button onclick="handleInput(document.getElementById('stepInput').value)">➔</button>`;

document.getElementById("stepInput").focus();

}

}

function startAIPhase(){

isAIPhase = true;

const msg =
reportData.language==="Malayalam"
? "ഇപ്പോൾ നിങ്ങൾ കണ്ട കാലാവസ്ഥ വിശദീകരിക്കുക."
: "Now describe the weather you witnessed.";

aiThinking(()=>{
addMessage(msg,"ai");
renderInput({type:"text"});
});


}

function addMessage(text,sender){

const div=document.createElement("div");
div.className=`msg ${sender}`;
div.innerHTML=text.replace(/\n/g,"<br>");

const box=document.getElementById("chat-box");
box.appendChild(div);

box.scrollTop=box.scrollHeight;

}

async function submitToFirebase(data){

const now=new Date();
const datePart=now.toISOString().slice(2,10).replace(/-/g,"");

const counterRef=ref(db,"report_counter");

const result=await runTransaction(counterRef,v=>(v||0)+1);

const humanId=`ELW-${datePart}${String(result.snapshot.val()).padStart(3,"0")}`;

const finalEntry={
...data,
humanId,
timestamp:Date.now(),
photo_url:"N/A",
granted_site1:"no",
granted_site2:"no"
};

await push(ref(db,"weather_reports"),finalEntry);

if(data.priority==="urgent"){
fetch(FORMSPREE_URL,{
method:"POST",
body:JSON.stringify(finalEntry),
headers:{ "Content-Type":"application/json"}
});
}

document.getElementById("refDisplay").innerText="Reference ID: "+humanId;
document.getElementById("successModal").classList.remove("hidden");

}

const greetings=[
"Welcome! I am your AI Weather Assistant.",
"Hi! Let's file your weather report.",
"Hello! I'm here to help."
];

// First greeting
addMessage(greetings[Math.floor(Math.random()*greetings.length)],"ai");

// Second message (your explanation)
setTimeout(()=>{

addMessage(`
<b>Share Your Weather Observation</b>

നിങ്ങൾ കാണുന്ന കാലാവസ്ഥ സ്ഥിതി ഞങ്ങളുമായി പങ്കുവയ്ക്കുന്നതിലൂടെ ഈ വിവരങ്ങൾ മറ്റുള്ളവരിലേക്കും പങ്കുവയ്ക്കാനുള്ള വഴി ഞങ്ങൾ ഒരുക്കുന്നു.
നിങ്ങൾ അനുമതി നൽകുകയാണെങ്കിൽ നിങ്ങളുടെ പേരും പരാമർശിക്കുന്നു.

<a href="report-rule.html" style="color:#0066cc;text-decoration:underline;">
റിപോർട്ട് സമർപ്പിക്കേണ്ടതിനെ കുറിച്ച് കൂടുതൽ അറിയുവാൻ ഇവിടെ തൊടുക
</a>
`,"ai");

},600);


// Then start questions
setTimeout(showStep,1600);

</script>

</body>
</html>
