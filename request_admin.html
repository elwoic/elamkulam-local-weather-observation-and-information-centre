<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ELWOIC Admin Panel</title>

<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; }
.container { max-width:1200px; margin:auto; background:white; padding:20px; border-radius:10px; }
h2 { text-align:center; }

.controls { display:flex; gap:10px; margin-top:10px; flex-wrap:wrap; }
input, select { padding:8px; }

.table { width:100%; border-collapse:collapse; margin-top:20px; }
.table th,.table td { border:1px solid #ccc; padding:8px; }
.table th { background:#000; color:#fff; }

button { padding:6px 10px; cursor:pointer; border:none; margin:2px; }
.approve { background:green; color:white; }
.reject { background:red; color:white; }
.delete { background:#333; color:white; }
.view { background:#007bff; color:white; }
.cancel { background:gray; color:white; }

.modal {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.6); display:none; justify-content:center; align-items:center;
}
.modal-content {
  background:white; padding:20px; width:500px; max-height:90vh; overflow:auto; border-radius:10px;
}
textarea { width:100%; height:150px; }
</style>
</head>

<body>
<div class="container">
<h2>ELWOIC Admin Panel</h2>

<div class="controls">
  <input type="text" id="search" placeholder="Search name/email/requestId">
  <select id="filterStatus">
    <option value="all">All</option>
    <option value="pending">Pending</option>
    <option value="approved">Approved</option>
    <option value="rejected">Rejected</option>
  </select>
  <select id="sort">
    <option value="latest">Latest First</option>
    <option value="pending">Pending First</option>
  </select>
</div>

<table class="table">
<thead>
<tr>
<th>ID</th><th>Name</th><th>Email</th><th>Status</th><th>Action</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<!-- VIEW MODAL -->
<div class="modal" id="viewModal">
<div class="modal-content" id="viewContent"></div>
</div>

<!-- REPLY MODAL -->
<div class="modal" id="replyModal">
<div class="modal-content">
  <h3 id="replyTitle"></h3>
  <textarea id="replyText"></textarea>
  <br><br>
  <button onclick="sendReply()">Send</button>
  <button class="cancel" onclick="closeModal('replyModal')">Cancel</button>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
// MAIN DB (requests)
const app1 = firebase.initializeApp({
 apiKey:"AIzaSyCCGNGzhBWETU0gyTUeA2wUVnlQbl2-khU",
 databaseURL:"https://data-request-161d5-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const db = app1.database();

// WEATHER DB
const app2 = firebase.initializeApp({
 apiKey:"AIzaSyALWX2l-9_6izgvt_JerJjTDbgNc5oT2VQ",
 databaseURL:"https://report-20d26-default-rtdb.asia-southeast1.firebasedatabase.app"
},"weather");

const weatherDb = app2.database();

emailjs.init("p5ikS_d-yFWcyzvac");

// VARIABLES
let allData = [];
let weatherData = [];

let currentKey, currentEmail, currentName, currentRequestId;
let currentParameters, currentType;
let currentDate, currentTime, currentFrom, currentTo;

const tableBody = document.getElementById("tableBody");

// LOAD REQUESTS
db.ref("requests").on("value", snap=>{
  allData=[];
  snap.forEach(c=>{
    let d=c.val(); d.key=c.key;
    allData.push(d);
  });
  render();
});

// LOAD WEATHER
weatherDb.ref("weather_logs").on("value", snap=>{
  weatherData=[];
  snap.forEach(c=>{
    let d = c.val();
    weatherData.push(d);
  });
});

// RENDER TABLE
function render(){
 let search = searchBox.value.toLowerCase();
 let status = filterStatus.value;
 let sort = sortSelect.value;

 let data = allData.filter(d=>{
   return (
     (status==="all" || d.status===status) &&
     (d.name.toLowerCase().includes(search) ||
      d.email.toLowerCase().includes(search) ||
      d.requestId.includes(search))
   );
 });

 if(sort==="latest") data.sort((a,b)=> b.created_at.localeCompare(a.created_at));
 if(sort==="pending") data.sort((a,b)=> (a.status==='pending'?-1:1));

 tableBody.innerHTML="";
 data.forEach(d=>{
   tableBody.innerHTML += `
   <tr>
    <td>${d.requestId}</td>
    <td>${d.name}</td>
    <td>${d.email}</td>
    <td>${d.status}</td>
    <td>
      <button class="view" onclick="view('${d.key}')">View</button>
      <button class="delete" onclick="del('${d.key}')">Delete</button>
    </td>
   </tr>`;
 });
}

const searchBox = document.getElementById("search");
const filterStatus = document.getElementById("filterStatus");
const sortSelect = document.getElementById("sort");

searchBox.oninput = filterStatus.onchange = sortSelect.onchange = render;

// VIEW
function view(key){
 let d = allData.find(x=>x.key===key);

 let isDone = d.status === "approved" || d.status === "rejected";

 let html = `<h3>${d.requestId}</h3>
 <p><b>Name:</b> ${d.name}</p>
 <p><b>Email:</b> ${d.email}</p>
 <p><b>Parameters:</b> ${d.parameters}</p>
 <p><b>Type:</b> ${d.type}</p>
 <p><b>Status:</b> ${d.status}</p>
 <br>
 <button class="approve" ${isDone?"disabled":""}
   onclick="openReply('${d.key}','approved')">Approve</button>
 <button class="reject" ${isDone?"disabled":""}
   onclick="openReply('${d.key}','rejected')">Reject</button>
 <button onclick="closeModal('viewModal')">Close</button>`;

 viewContent.innerHTML = html;
 viewModal.style.display="flex";
}

// DELETE
function del(key){
 if(confirm("Delete?")) db.ref("requests/"+key).remove();
}

// OPEN REPLY + AUTO DATA
function openReply(key,status){
 let d = allData.find(x=>x.key===key);

 currentKey = key;
 currentEmail = d.email;
 currentName = d.name;
 currentRequestId = d.requestId;
 currentParameters = d.parameters.toLowerCase();
 currentType = d.type;
 currentDate = d.date;
 currentTime = d.time;
 currentFrom = d.from_date;
 currentTo = d.to_date;

 document.getElementById("replyTitle").innerText = status.toUpperCase();

 let filtered=[];

 // 🔹 SPECIFIC DATE
 if(currentType.includes("Specific")){
   filtered = weatherData.filter(w =>
     (w.timestamp_ist||"").includes(currentDate)
   );
 }

 // 🔹 DATE RANGE
 if(currentType.includes("Range")){
   filtered = weatherData.filter(w=>{
     let dStr=(w.timestamp_ist||"").split(",")[0];
     return dStr>=currentFrom && dStr<=currentTo;
   });
 }

 // LIMIT
 filtered = filtered.slice(0,20);

 // 🔥 PARAMETER FILTER
 let preview = filtered.map(w=>{
   let line = "";

   if(currentParameters.includes("temp"))
     line += `🌡 Temp: ${w.consensus_temp || w.temp_c || "-"}°C | `;

   if(currentParameters.includes("humidity"))
     line += `💧 Humidity: ${w.humidity || "-"}% | `;

   if(currentParameters.includes("pressure"))
     line += `📊 Pressure: ${w.pressure_hpa || "-"} hPa | `;

   if(currentParameters.includes("pm") || currentParameters.includes("aqi"))
     line += `AQI: ${w.aqi} (${w.aqi_status}) | PM2.5: ${w.pm25}`;

   return line || JSON.stringify(w);
 }).join("\n");

 if(!preview) preview = "No data found for this request.";

 document.getElementById("replyText").value =
`Data Preview:
${preview}

---------------------

`;

 window.currentStatus = status;
 replyModal.style.display="flex";
}

// SEND
function sendReply(){
 let msg = replyText.value;

 emailjs.send("service_3br5mjc","template_tzvvv1c",{
  email: currentEmail,
  name: currentName,
  requestId: currentRequestId,
  parameters: currentParameters,
  type: currentType,
  message: msg,
  status_message: window.currentStatus==="approved"
    ? "Your data request has been APPROVED by ELWOIC."
    : "Your data request has been REJECTED by ELWOIC."
 });

 db.ref("requests/"+currentKey).update({
   status: window.currentStatus
 });

 closeModal('replyModal');
 closeModal('viewModal');
}

function closeModal(id){
 document.getElementById(id).style.display="none";
}
</script>

</body>
</html>
