<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ELWOIC Admin Panel</title>

<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; }
.container { max-width:1200px; margin:auto; background:white; padding:20px; border-radius:10px; }
h2 { text-align:center; }

.controls { display:flex; gap:10px; margin-top:10px; flex-wrap:wrap; }
input, select { padding:8px; }

.table { width:100%; border-collapse:collapse; margin-top:20px; }
.table th,.table td { border:1px solid #ccc; padding:8px; }
.table th { background:#000; color:#fff; }

/* Status Colors */
.status-pending { color: orange; font-weight: bold; }
.status-approved { color: green; font-weight: bold; }
.status-approved_pending { color: #007bff; font-weight: bold; }
.status-rejected { color: red; font-weight: bold; }

button { padding:6px 10px; cursor:pointer; border:none; margin:2px; }
.approve { background:green; color:white; }
.reject { background:red; color:white; }
.delete { background:#333; color:white; }
.view { background:#007bff; color:white; }
.cancel { background:gray; color:white; }

.modal {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.6); display:none; justify-content:center; align-items:center; z-index: 1000;
}
.modal-content {
  background:white; padding:20px; width:500px; max-height:90vh; overflow:auto; border-radius:10px;
}
textarea { width:100%; height:150px; margin-top: 10px; }

.checkbox-area {
    background: #f9f9f9;
    padding: 10px;
    border: 1px solid #ddd;
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
}
</style>
</head>

<body>
<div class="container">
<h2>ELWOIC Admin Panel</h2>
<button onclick="logout()">Logout</button>

<div class="controls">
  <input type="text" id="search" placeholder="Search name/email/requestId">
  <select id="filterStatus">
    <option value="all">All</option>
    <option value="pending">Pending</option>
    <option value="approved">Approved (Data Sent)</option>
    <option value="approved_pending">Approved (Data Pending)</option>
    <option value="rejected">Rejected</option>
  </select>
  <select id="sort">
    <option value="latest">Latest First</option>
    <option value="pending">Pending First</option>
  </select>
</div>

<table class="table">
<thead>
<tr>
<th>ID</th><th>Name</th><th>Email</th><th>Status</th><th>Action</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<div class="modal" id="viewModal">
<div class="modal-content" id="viewContent"></div>
</div>

<div class="modal" id="replyModal">
<div class="modal-content">
  <h3 id="replyTitle"></h3>
  <div id="approvalOptions" class="checkbox-area" style="display:none;">
      <input type="checkbox" id="dataPendingCheck">
      <label for="dataPendingCheck"><b>Data not ready yet.</b> (Notify user that approval is granted but data is being processed)</label>
  </div>
  <textarea id="replyText"></textarea>
  <br><br>
  <button class="approve" onclick="sendReply()">Send & Update Status</button>
  <button class="cancel" onclick="closeModal('replyModal')">Cancel</button>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script>
// INITIALIZATION
const app1 = firebase.initializeApp({
 apiKey:"AIzaSyCCGNGzhBWETU0gyTUeA2wUVnlQbl2-khU",
 authDomain:"data-request-161d5.firebaseapp.com",
 databaseURL:"https://data-request-161d5-default-rtdb.asia-southeast1.firebasedatabase.app"
});
const db = app1.database();

const app2 = firebase.initializeApp({
 apiKey:"AIzaSyALWX2l-9_6izgvt_JerJjTDbgNc5oT2VQ",
 databaseURL:"https://report-20d26-default-rtdb.asia-southeast1.firebasedatabase.app"
},"weather");
const weatherDb = app2.database();

emailjs.init("p5ikS_d-yFWcyzvac");

let allData = [];
let weatherData = [];
let currentKey, currentEmail, currentName, currentRequestId, currentParameters, currentType;

const auth = firebase.auth();
const allowedEmails = ["aswanthkrishnak822@gmail.com", "elwoicelamkulam@gmail.com"];

auth.onAuthStateChanged(user => {
  if (!user || !allowedEmails.includes(user.email)) {
    window.location.href = "request_admin_login.html";
    return;
  }
  db.ref("requests").on("value", snap=>{
    allData=[];
    snap.forEach(c=>{
      let d=c.val(); d.key=c.key;
      allData.push(d);
    });
    render();
  });
});

weatherDb.ref("weather_logs").on("value", snap=>{
  weatherData=[];
  snap.forEach(c=>{ weatherData.push(c.val()); });
});

function render(){
 let search = document.getElementById("search").value.toLowerCase();
 let status = document.getElementById("filterStatus").value;
 let sort = document.getElementById("sort").value;

 let data = allData.filter(d=>{
   return (
     (status==="all" || d.status===status) &&
     (d.name.toLowerCase().includes(search) || d.email.toLowerCase().includes(search) || d.requestId.includes(search))
   );
 });

 if(sort==="latest") data.sort((a,b)=> b.created_at.localeCompare(a.created_at));
 if(sort==="pending") data.sort((a,b)=> (a.status==='pending'?-1:1));

 const tableBody = document.getElementById("tableBody");
 tableBody.innerHTML="";
 data.forEach(d=>{
   let statusText = d.status;
   if(d.status === "approved_pending") statusText = "Approved (Pending Data)";
   
   tableBody.innerHTML += `
   <tr>
    <td>${d.requestId}</td>
    <td>${d.name}</td>
    <td>${d.email}</td>
    <td class="status-${d.status}">${statusText.toUpperCase()}</td>
    <td>
      <button class="view" onclick="view('${d.key}')">View</button>
      <button class="delete" onclick="del('${d.key}')">Delete</button>
    </td>
   </tr>`;
 });
}

document.getElementById("search").oninput = document.getElementById("filterStatus").onchange = document.getElementById("sort").onchange = render;

// UPDATED VIEW FUNCTION - SHOWS ALL FIELDS
function view(key){
    let d = allData.find(x => x.key === key);
    
    // Status styling for the modal
    let statusClass = "status-" + d.status;
    let isDone = d.status === "approved" || d.status === "rejected";

    let html = `
    <div style="border-bottom: 2px solid #000; margin-bottom: 15px; padding-bottom: 10px;">
        <h2 style="margin:0;">Full Request Details</h2>
        <small><b>Request ID:</b> ${d.requestId}</small>
    </div>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 14px;">
        <p><b>Name:</b><br>${d.name}</p>
        <p><b>Email:</b><br>${d.email}</p>
        <p><b>Phone:</b><br>${d.phone || "Not Provided"}</p>
        <p><b>Submitted On:</b><br>${new Date(d.created_at).toLocaleString()}</p>
    </div>

    <hr>
    
    <p><b>Purpose of Request:</b><br>${d.purpose}</p>
    <p><b>Required Parameters:</b><br>${d.parameters}</p>
    <p><b>Request Type:</b><br>${d.type}</p>
    
    <div style="display: flex; gap: 20px; background: #f9f9f9; padding: 10px; border-radius: 5px;">
        <div><b>Specific Date:</b> ${d.date || "-"}</div>
        <div><b>Time:</b> ${d.time || "-"}</div>
    </div>
    
    <div style="display: flex; gap: 20px; background: #f9f9f9; padding: 10px; border-radius: 5px; margin-top: 5px;">
        <div><b>From:</b> ${d.from_date || "-"}</div>
        <div><b>To:</b> ${d.to_date || "-"}</div>
    </div>

    <div style="margin-top: 15px; padding: 10px; border: 1px dashed #666; background: #fffbe6;">
        <b>Additional Details:</b><br>
        ${d.additional_details || "<i>No additional details provided.</i>"}
    </div>

    <p><b>Current Status:</b> <span class="${statusClass}" style="text-transform:uppercase;">${d.status.replace('_', ' ')}</span></p>
    
    <br>
    <div style="display:flex; gap:10px; flex-wrap: wrap;">
        <button class="approve" onclick="openReply('${d.key}','approved')">Approve / Update</button>
        <button class="reject" onclick="openReply('${d.key}','rejected')">Reject Request</button>
        <button class="cancel" onclick="closeModal('viewModal')">Close Window</button>
    </div>`;

    document.getElementById("viewContent").innerHTML = html;
    document.getElementById("viewModal").style.display = "flex";
}

function openReply(key, status) {
    let d = allData.find(x => x.key === key);
    currentKey = key;
    currentEmail = d.email;
    currentName = d.name;
    currentRequestId = d.requestId;
    currentParameters = d.parameters;
    currentType = d.type;
    
    document.getElementById("replyTitle").innerText = status.toUpperCase();
    const approvalOptions = document.getElementById("approvalOptions");
    
    if (status === "approved") {
        approvalOptions.style.display = "block";
        // Logic for auto-data fetching (similar to your previous version)
        let searchDate = "";
        if (d.date) {
            let parts = d.date.split("-");
            searchDate = `${parts[2]}/${parts[1]}/${parts[0]}`;
        }
        document.getElementById("replyText").value = `Dear ${currentName},\n\nYour request has been approved. [Data will be inserted here or notified as pending] \n\nBest Regards,\nAdmin Team, ELWOIC`;
    } else {
        approvalOptions.style.display = "none";
        document.getElementById("replyText").value = `Dear ${currentName},\n\nUnfortunately, your request could not be approved at this time.\n\nBest Regards,\nAdmin Team, ELWOIC`;
    }

    window.currentStatus = status;
    document.getElementById("replyModal").style.display = "flex";
}

function sendReply(){
    let msg = document.getElementById("replyText").value;
    let isPending = document.getElementById("dataPendingCheck").checked;
    let finalStatus = window.currentStatus;

    let statusMsg = "";
    if (window.currentStatus === "approved") {
        if (isPending) {
            finalStatus = "approved_pending";
            statusMsg = "Your data request has been APPROVED, but the data is currently being processed. We will send the final data shortly.";
        } else {
            finalStatus = "approved";
            statusMsg = "Your data request has been APPROVED and the data is provided below.";
        }
    } else {
        statusMsg = "Your data request has been REJECTED by ELWOIC.";
    }

    emailjs.send("service_3br5mjc","template_tzvvv1c",{
        email: currentEmail,
        name: currentName,
        requestId: currentRequestId,
        parameters: currentParameters,
        type: currentType,
        message: msg,
        status_message: statusMsg
    }).then(() => {
        db.ref("requests/" + currentKey).update({ status: finalStatus });
        alert("Notification Sent. Status: " + finalStatus);
        closeModal('replyModal');
        closeModal('viewModal');
    });
}

function del(key){ if(confirm("Delete?")) db.ref("requests/"+key).remove(); }
function logout(){ auth.signOut().then(()=> window.location.href = "request_admin_login.html"); }
function closeModal(id){ document.getElementById(id).style.display="none"; }
</script>
</body>
</html>
