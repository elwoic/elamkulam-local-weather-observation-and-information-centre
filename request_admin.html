<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELWOIC Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f8fa;
  --surface: #ffffff;
  --sf2: #f1f3f7;
  --sf3: #e8ecf2;
  --border: #dde2ec;
  --border2: #c8d0e0;
  --text: #1a2236;
  --muted: #7a8aaa;
  --muted2: #b0baca;
  --accent: #2f81f7;
  --accent2: #1f6feb;
  --green: #3fb950;
  --green2: #238636;
  --red: #f85149;
  --red2: #da3633;
  --orange: #d29922;
  --teal: #39c5cf;
  --purple: #a371f7;
  --yellow: #e3b341;
  --mono: 'IBM Plex Mono', monospace;
  --serif: 'Fraunces', Georgia, serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--mono); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 13px; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted2); }

/* LOGIN */
#loginScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); position: relative; overflow: hidden; }
#loginScreen::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(47,129,247,0.08) 0%, transparent 70%); pointer-events: none; }
.login-box { width: 380px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 44px 36px; text-align: center; position: relative; box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 16px 64px rgba(0,0,0,0.5); }
.login-logo { font-family: var(--mono); font-size: 26px; font-weight: 600; letter-spacing: 8px; color: var(--text); margin-bottom: 4px; }
.login-sub { font-size: 10px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px; }
.login-rule { width: 32px; height: 1px; background: var(--accent); margin: 0 auto 32px; opacity: 0.6; }
.login-box input { width: 100%; padding: 10px 14px; background: var(--sf2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--mono); font-size: 13px; margin-bottom: 10px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
.login-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(47,129,247,0.12); }
.login-box input::placeholder { color: var(--muted2); }
.login-btn { width: 100%; padding: 11px; background: var(--accent2); color: #fff; border: none; border-radius: 6px; font-family: var(--mono); font-size: 12px; font-weight: 500; letter-spacing: 1px; cursor: pointer; transition: background 0.2s, transform 0.1s; margin-top: 4px; }
.login-btn:hover { background: var(--accent); }
.login-btn:active { transform: scale(0.99); }
.login-btn:disabled { background: var(--muted2); cursor: not-allowed; }
.login-err { color: var(--red); font-size: 11px; margin-top: 10px; display: none; }

/* TOPBAR */
#appScreen { display: none; }
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 52px; position: sticky; top: 0; z-index: 100; }
.tb-left { display: flex; align-items: center; gap: 16px; }
.tb-logo { font-family: var(--mono); font-size: 13px; font-weight: 600; letter-spacing: 5px; color: var(--text); }
.tb-sep { width: 1px; height: 16px; background: var(--border); }
.tb-sub { font-size: 11px; color: var(--muted); letter-spacing: 0.5px; }
.tb-right { display: flex; align-items: center; gap: 8px; }
.stat-chip { display: flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 500; border: 1px solid var(--border); background: var(--sf2); color: var(--muted); }
.stat-chip .dot { width: 6px; height: 6px; border-radius: 50%; }
.stat-chip.pending .dot { background: var(--yellow); }
.stat-chip.pending { color: var(--yellow); border-color: rgba(227,179,65,0.25); background: rgba(227,179,65,0.06); }
.stat-chip.active .dot { background: var(--green); }
.stat-chip.active { color: var(--green); border-color: rgba(63,185,80,0.25); background: rgba(63,185,80,0.06); }
.stat-chip.closed .dot { background: var(--muted); }
.logout-btn { padding: 5px 12px; background: transparent; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-family: var(--mono); font-size: 11px; cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px; }
.logout-btn:hover { border-color: var(--red); color: var(--red); }

/* MAIN */
.main { padding: 20px 24px; }
.controls { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.controls input, .controls select { padding: 7px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--mono); font-size: 12px; outline: none; transition: border-color 0.2s; }
.controls input { flex: 1; min-width: 200px; }
.controls input::placeholder { color: var(--muted2); }
.controls input:focus, .controls select:focus { border-color: var(--accent); }
.controls select { background: var(--surface); color: var(--text); }
.controls select option { background: var(--sf2); }
.refresh-btn { padding: 7px 14px; background: var(--sf2); border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-family: var(--mono); font-size: 12px; cursor: pointer; transition: all 0.2s; }
.refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

/* TABLE */
.table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
thead tr { background: var(--sf2); border-bottom: 1px solid var(--border); }
th { padding: 9px 14px; text-align: left; font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); font-family: var(--mono); }
tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--sf2); }
td { padding: 10px 14px; font-size: 12px; vertical-align: middle; color: var(--text); }
.td-mono { font-family: var(--mono); font-size: 11px; color: var(--muted); font-weight: 500; }
.status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; font-family: var(--mono); white-space: nowrap; }
.sb-pending { background: rgba(227,179,65,0.1); color: var(--yellow); border: 1px solid rgba(227,179,65,0.3); }
.sb-viewed { background: rgba(47,129,247,0.1); color: var(--accent); border: 1px solid rgba(47,129,247,0.3); }
.sb-resubmitted { background: rgba(57,197,207,0.1); color: var(--teal); border: 1px solid rgba(57,197,207,0.3); }
.sb-approved-pending { background: rgba(57,197,207,0.1); color: var(--teal); border: 1px solid rgba(57,197,207,0.3); }
.sb-approved { background: rgba(63,185,80,0.1); color: var(--green); border: 1px solid rgba(63,185,80,0.3); }
.sb-failed { background: rgba(163,113,247,0.1); color: var(--purple); border: 1px solid rgba(163,113,247,0.3); }
.sb-rejected { background: rgba(248,81,73,0.1); color: var(--red); border: 1px solid rgba(248,81,73,0.3); }
.sb-closed { background: rgba(125,133,144,0.1); color: var(--muted); border: 1px solid rgba(125,133,144,0.3); }
.tbl-btn { padding: 4px 10px; font-size: 11px; font-weight: 500; border-radius: 5px; cursor: pointer; font-family: var(--mono); transition: all 0.15s; border: 1px solid var(--border); background: var(--sf2); color: var(--muted); }
.tbl-btn:hover { background: var(--sf3); color: var(--text); border-color: var(--border2); }
.tbl-btn-del { background: transparent; color: var(--muted2); border: 1px solid var(--border); }
.tbl-btn-del:hover { color: var(--red); border-color: rgba(248,81,73,0.5); background: rgba(248,81,73,0.06); }

/* OVERLAY / MODAL */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 16px; backdrop-filter: blur(2px); }
.overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-height: 94vh; overflow-y: auto; box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 24px 80px rgba(0,0,0,0.6); }
.modal-wide { max-width: 980px; }
.mhead { padding: 14px 20px 13px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--sf2); border-radius: 12px 12px 0 0; position: sticky; top: 0; z-index: 10; }
.mhead-left { display: flex; align-items: center; gap: 10px; }
.mhead h3 { font-family: var(--mono); font-size: 11px; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; font-weight: 400; }
.mhead-id { font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--text); padding: 2px 8px; background: var(--sf3); border: 1px solid var(--border2); border-radius: 4px; }
.mx { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; line-height: 1; padding: 2px 6px; border-radius: 4px; transition: all 0.15s; }
.mx:hover { color: var(--text); background: var(--sf3); }
.mbody { padding: 20px; }

/* WORKSPACE */
.workspace-layout { display: grid; grid-template-columns: 420px 1fr; gap: 20px; align-items: start; }
.meta-panel { background: var(--sf2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; position: sticky; top: 80px; }
.meta-panel-head { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.meta-panel-head h4 { font-family: var(--mono); font-size: 10px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
.meta-body { padding: 14px 16px; }
.meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.meta-item label { display: block; font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted2); margin-bottom: 3px; font-weight: 500; }
.meta-item span { font-size: 12px; color: var(--text); word-break: break-word; line-height: 1.4; }
.meta-item span.highlight { color: var(--accent); font-weight: 500; }
.meta-divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
.meta-block { margin-bottom: 12px; }
.meta-block:last-child { margin-bottom: 0; }
.meta-block label { display: block; font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted2); margin-bottom: 5px; font-weight: 500; }
.meta-textbox { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 9px 11px; font-size: 12px; color: var(--text); line-height: 1.6; word-break: break-word; font-family: var(--mono); min-height: 36px; }
.meta-textbox.params { border-left: 3px solid var(--accent); color: var(--accent); font-size: 11px; }
.meta-textbox.extra { border-left: 3px solid var(--orange); background: rgba(210,153,34,0.04); }

/* EXEC PANEL */
.exec-panel { display: flex; flex-direction: column; gap: 10px; }
.exec-panel-head { font-family: var(--mono); font-size: 10px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); padding-bottom: 10px; border-bottom: 1px solid var(--border); margin-bottom: 4px; }

/* STAGE CARDS */
.stage-card { background: var(--sf2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: all 0.2s; }
.stage-card.s-active { border-color: rgba(47,129,247,0.4); box-shadow: 0 0 0 1px rgba(47,129,247,0.1); }
.stage-card.s-complete { border-color: rgba(63,185,80,0.3); }
.stage-card.s-locked { opacity: 0.4; pointer-events: none; }
.stage-card.s-warn { border-color: rgba(163,113,247,0.4); }
.stage-card.s-reject { border-color: rgba(248,81,73,0.3); }
.stage-card.s-reject-done { border-color: rgba(248,81,73,0.2); background: rgba(248,81,73,0.03); }
.stage-card.s-closed-case { border-color: rgba(125,133,144,0.3); opacity: 0.7; }
.card-head { padding: 11px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; background: var(--sf3); }
.stage-num { font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 3px; text-transform: uppercase; letter-spacing: 1px; font-family: var(--mono); background: var(--border); color: var(--muted); }
.s-active .stage-num { background: rgba(47,129,247,0.2); color: var(--accent); }
.s-complete .stage-num { background: rgba(63,185,80,0.2); color: var(--green); }
.s-warn .stage-num { background: rgba(163,113,247,0.2); color: var(--purple); }
.s-reject .stage-num, .s-reject-done .stage-num { background: rgba(248,81,73,0.15); color: var(--red); }
.card-head h4 { font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--text); margin: 0; }
.card-head-icon { margin-left: auto; font-size: 13px; color: var(--muted); }
.card-body { padding: 14px; }

/* BANNERS */
.banner { padding: 9px 12px; border-radius: 6px; font-size: 12px; line-height: 1.5; font-family: var(--mono); }
.banner-green { background: rgba(63,185,80,0.08); border: 1px solid rgba(63,185,80,0.25); color: var(--green); }
.banner-red { background: rgba(248,81,73,0.08); border: 1px solid rgba(248,81,73,0.25); color: var(--red); }
.banner-orange { background: rgba(210,153,34,0.08); border: 1px solid rgba(210,153,34,0.25); color: var(--orange); }
.banner-blue { background: rgba(47,129,247,0.08); border: 1px solid rgba(47,129,247,0.25); color: var(--accent); }
.banner-purple { background: rgba(163,113,247,0.08); border: 1px solid rgba(163,113,247,0.25); color: var(--purple); }
.banner-gray { background: rgba(125,133,144,0.08); border: 1px solid rgba(125,133,144,0.2); color: var(--muted); }

/* FORM */
.field-label { display: block; font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 4px; font-family: var(--mono); }
.finp { width: 100%; padding: 8px 11px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--mono); font-size: 12px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; margin-bottom: 10px; }
.finp:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(47,129,247,0.1); }
.finp::placeholder { color: var(--muted2); }
.fta { width: 100%; padding: 8px 11px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--mono); font-size: 12px; line-height: 1.6; resize: vertical; outline: none; transition: border-color 0.2s; margin-bottom: 10px; }
.fta:focus { border-color: var(--accent); }
.fta-sm { height: 90px; }
.fta-md { height: 130px; }
.fta-lg { height: 160px; }
.finp.green { color: var(--green); }
.finp.red { color: var(--red); }
.finp.purple { color: var(--purple); }

/* BUTTONS */
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
.pbtn { padding: 7px 14px; border: none; border-radius: 6px; font-size: 11px; font-weight: 500; cursor: pointer; font-family: var(--mono); transition: all 0.15s; letter-spacing: 0.5px; }
.pbtn:hover { opacity: 0.85; }
.pbtn:active { transform: scale(0.98); }
.pbtn-green { background: var(--green2); color: #fff; border: 1px solid rgba(63,185,80,0.3); }
.pbtn-red { background: rgba(218,54,51,0.9); color: #fff; border: 1px solid rgba(248,81,73,0.3); }
.pbtn-blue { background: var(--accent2); color: #fff; border: 1px solid rgba(47,129,247,0.3); }
.pbtn-purple { background: #7c3aed; color: #fff; border: 1px solid rgba(163,113,247,0.3); }
.pbtn-gray { background: var(--sf3); color: var(--muted); border: 1px solid var(--border2); }
.pbtn-gray:hover { color: var(--text); opacity: 1; }
.pbtn-full { width: 100%; text-align: center; }

/* MISC */
.data-display { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; font-family: var(--mono); font-size: 11px; color: var(--teal); max-height: 120px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; line-height: 1.5; }
.inst { font-size: 11px; color: var(--muted); line-height: 1.6; margin-bottom: 10px; font-family: var(--mono); }
.locked-txt { font-size: 11px; color: var(--muted2); font-style: italic; font-family: var(--mono); }
.reopen-note { font-size: 11px; color: var(--muted); margin-top: 8px; font-style: italic; line-height: 1.5; }
.collapse-zone { display: none; border-top: 1px solid var(--border); padding-top: 12px; margin-top: 12px; }
.sdiv { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

/* TOAST */
.toast { position: fixed; bottom: 20px; right: 20px; padding: 10px 18px; border-radius: 8px; font-size: 12px; font-weight: 500; z-index: 9999; opacity: 0; transform: translateY(6px); transition: all 0.25s; pointer-events: none; font-family: var(--mono); box-shadow: 0 4px 20px rgba(0,0,0,0.4); border: 1px solid transparent; }
.toast.show { opacity: 1; transform: translateY(0); }
.t-s { background: rgba(35,134,54,0.95); color: #fff; border-color: rgba(63,185,80,0.3); }
.t-e { background: rgba(218,54,51,0.95); color: #fff; border-color: rgba(248,81,73,0.3); }
.t-w { background: rgba(187,128,9,0.95); color: #fff; border-color: rgba(227,179,65,0.3); }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">ELWOIC</div>
    <div class="login-sub">Admin Panel</div>
    <div class="login-rule"></div>
    <input type="text" id="uname" placeholder="Username" onkeydown="if(event.key==='Enter')login()">
    <input type="password" id="upass" placeholder="Password" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" id="loginBtn" onclick="login()">SIGN IN</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<div id="appScreen">
  <div class="topbar">
    <div class="tb-left">
      <div class="tb-logo">ELWOIC</div>
      <div class="tb-sep"></div>
      <div class="tb-sub">Data Request Admin</div>
    </div>
    <div class="tb-right">
      <div class="stat-chip pending"><span class="dot"></span><span id="statP">—</span></div>
      <div class="stat-chip active"><span class="dot"></span><span id="statA">—</span></div>
      <div class="stat-chip closed"><span class="dot"></span><span id="statR">—</span></div>
      <button class="logout-btn" onclick="logout()">LOGOUT</button>
    </div>
  </div>

  <div class="main">
    <div class="controls">
      <input type="text" id="srch" placeholder="Search name, email, request ID…" oninput="render()">
      <select id="fltS" onchange="render()">
        <option value="all">All Status</option>
        <option value="Pending">Pending</option>
        <option value="verification_failed">Verification Failed</option>
        <option value="approved_pending">Approved (Pending)</option>
        <option value="approved">Approved</option>
        <option value="rejected">Rejected</option>
        <option value="closed">Closed</option>
      </select>
      <select id="fltO" onchange="render()">
        <option value="latest">Latest First</option>
        <option value="oldest">Oldest First</option>
      </select>
      <button class="refresh-btn" onclick="loadRequests()">↻ Refresh</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Request ID</th><th>Name</th><th>Email</th><th>Category</th>
            <th>Submitted</th><th>Status</th><th>Stage</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="tBody">
          <tr><td colspan="8" style="text-align:center;padding:32px;color:var(--muted)">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- WORKSPACE MODAL -->
<div class="overlay" id="oView">
  <div class="modal modal-wide">
    <div class="mhead">
      <div class="mhead-left">
        <h3>Processing Workspace</h3>
        <span class="mhead-id" id="viewTitle">—</span>
      </div>
      <button class="mx" onclick="closeM('oView')">×</button>
    </div>
    <div class="mbody" id="viewBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const W       = "https://data-admin-request-handler.bold-waterfall-0d01.workers.dev";
const EJS_SVC = "service_qpz7vpz";
const EJS_TPL = "template_gejp4qq";
const EJS_KEY = "Bd-no1cWjcYLmCKIW";

let allData = [], cur = {};

function getToken() { return sessionStorage.getItem("elwoic_token"); }

async function login() {
  const u = document.getElementById("uname").value.trim();
  const p = document.getElementById("upass").value;
  const btn = document.getElementById("loginBtn");
  const err = document.getElementById("loginErr");
  if (!u || !p) { err.textContent = "Please enter both fields."; err.style.display = "block"; return; }
  btn.disabled = true; btn.textContent = "SIGNING IN…"; err.style.display = "none";
  try {
    const r = await fetch(`${W}/login`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ username: u, password: p }) });
    const d = await r.json();
    if (r.ok && d.success) {
      sessionStorage.setItem("elwoic_token", d.token);
      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("appScreen").style.display = "block";
      loadRequests();
    } else { err.textContent = "Incorrect username or password."; err.style.display = "block"; }
  } catch (e) { err.textContent = "Connection failed."; err.style.display = "block"; }
  finally { btn.disabled = false; btn.textContent = "SIGN IN"; }
}

function logout() { sessionStorage.removeItem("elwoic_token"); location.reload(); }

window.addEventListener("load", () => {
  if (getToken()) {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("appScreen").style.display = "block";
    loadRequests();
  }
  emailjs.init(EJS_KEY);
});

async function af(url, opts = {}) {
  const r = await fetch(url, { ...opts, headers: { "Content-Type": "application/json", "X-Admin-Token": getToken(), ...(opts.headers || {}) } });
  if (r.status === 401) { showToast("Session expired", "e"); setTimeout(logout, 2000); throw new Error("401"); }
  return r;
}

async function loadRequests() {
  try {
    const r = await af(`${W}/requests`);
    allData = await r.json();
    updateStats(); render();
  } catch (e) { if (e.message !== "401") showToast("Failed to load requests", "e"); }
}

function updateStats() {
  const p = allData.filter(d => !d.verified_at && d.status !== "rejected" && !d.case_closed_at).length;
  const a = allData.filter(d => d.verified_at && !d.data_prep_at && d.status !== "rejected" && !d.case_closed_at).length;
  const c = allData.filter(d => d.case_closed_at || d.status === "rejected").length;
  document.getElementById("statP").textContent = p + " Verification Pending";
  document.getElementById("statA").textContent = a + " Data Prep Needed";
  document.getElementById("statR").textContent = c + " Closed / Rejected";
}

function stageLbl(d) {
  if (d.status === "rejected")                           return '<span style="color:var(--red);">❌ Rejected</span>';
  if (d.case_closed_at)                                  return '<span style="color:var(--muted);">🔒 Closed</span>';
  if (d.data_sent_at)                                    return '<span style="color:var(--green);">✓ Delivered</span>';
  if (d.data_prep_at)                                    return '<span style="color:var(--teal);">📦 Data Ready</span>';
  if (d.verified_at && !d.verification_failed_reason)    return '<span style="color:var(--accent);">⚙ Verified</span>';
  if (d.verification_failed_reason)                      return '<span style="color:var(--purple);">⚠ Verif. Failed</span>';
  return '<span style="color:var(--yellow);">⏳ New</span>';
}

function fmtTs(ts) {
  if (!ts) return null;
  return new Date(ts).toLocaleString("en-IN", { timeZone: "Asia/Kolkata", day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit", hour12: true }) + " IST";
}

function render() {
  const q  = document.getElementById("srch").value.toLowerCase();
  const fs = document.getElementById("fltS").value;
  const fo = document.getElementById("fltO").value;

  let data = allData.filter(d => {
    const matchStatus =
      fs === "all" ||
      (fs === "Pending"             && d.status === "Pending") ||
      (fs === "verification_failed" && d.status === "verification_failed") ||
      (fs === "approved_pending"    && d.status === "approved_pending") ||
      (fs === "approved"            && d.status === "approved") ||
      (fs === "rejected"            && d.status === "rejected") ||
      (fs === "closed"              && !!d.case_closed_at);
    const matchQ = (d.name || "").toLowerCase().includes(q) ||
                   (d.email || "").toLowerCase().includes(q) ||
                   (d.request_id || "").toLowerCase().includes(q);
    return matchStatus && matchQ;
  });

  if (fo === "latest") data.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  if (fo === "oldest") data.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

  const body = document.getElementById("tBody");
  if (!data.length) {
    body.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:32px;color:var(--muted)">No records match current filters.</td></tr>`;
    return;
  }

  body.innerHTML = data.map(d => {
    const dt = d.created_at ? new Date(d.created_at).toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" }) : "—";
    const isResubmission = d.status === "Pending" && d.verification_failed_reason !== null;

    let badge = `<span class="status-badge sb-pending">⏳ New</span>`;
    if (isResubmission)                       badge = `<span class="status-badge sb-resubmitted">🔄 Resubmitted</span>`;
    else if (d.status === "viewed")           badge = `<span class="status-badge sb-viewed">👁 Viewed</span>`;
    else if (d.status === "approved_pending") badge = `<span class="status-badge sb-approved-pending">⚙ Appr. Pending</span>`;
    else if (d.status === "approved")         badge = `<span class="status-badge sb-approved">✓ Delivered</span>`;
    else if (d.status === "verification_failed") badge = `<span class="status-badge sb-failed">⚠ Verif. Failed</span>`;
    else if (d.status === "rejected")         badge = `<span class="status-badge sb-rejected">❌ Rejected</span>`;
    else if (d.case_closed_at)                badge = `<span class="status-badge sb-closed">🔒 Closed</span>`;

    return `<tr>
      <td class="td-mono" style="font-weight:600;color:var(--text);">${d.request_id || "—"}</td>
      <td style="font-weight:500;">${d.name || "—"}</td>
      <td style="color:var(--muted);font-size:11px;">${d.email || "—"}</td>
      <td style="font-size:11px;color:var(--muted);">${d.purpose_category || "—"}</td>
      <td class="td-mono">${dt}</td>
      <td>${badge}</td>
      <td style="font-size:11px;">${stageLbl(d)}</td>
      <td>
        <div style="display:flex;gap:6px;">
          <button class="tbl-btn" onclick="viewReq(${d.id})">Open</button>
          <button class="tbl-btn tbl-btn-del" onclick="executeDirectDeletion(${d.id})">Delete</button>
        </div>
      </td>
    </tr>`;
  }).join("");
}

async function viewReq(id) {
  const numericId = Number(id);
  const d = allData.find(x => x.id === numericId);
  if (!d) return;
  cur = d;

  if (!d.seen_at || d.status === "Pending") {
    const now = new Date().toISOString();
    patchLocal(numericId, { seen_at: now, status: "viewed" });
    render();
    af(`${W}/update`, { method: "POST", body: JSON.stringify({ id: numericId, seen_at: now, status: "viewed" }) }).catch(console.error);
  }

  document.getElementById("viewTitle").textContent = d.request_id || "—";
  buildWorkspaceDOM(d);
  openM("oView");
}

          <div class="meta-item"><label>Email</label><span style="font-size:11px;">${d.email || "—"}</span></div>
          <div class="meta-item"><label>Phone</label><span>${d.phone || "—"}</span></div>
          <div class="meta-item"><label>Organisation</label><span>${d.organisation || "—"}</span></div>
          <div class="meta-item"><label>Designation</label><span>${d.designation || "—"}</span></div>
          <div class="meta-item"><label>Category</label><span>${d.purpose_category || "—"}</span></div>
          <div class="meta-item"><label>Request Type</label><span class="highlight">${d.type || "—"}</span></div>
          <div class="meta-item"><label>Format</label><span>${d.response_format || "—"}</span></div>
          <div class="meta-item"><label>Date Range</label><span style="font-size:11px;">${[d.from_date, d.to_date].filter(Boolean).join(" → ") || "Single Window"}</span></div>
        </div>
        <hr class="meta-divider">
        <div class="meta-block">
          <label>Purpose</label>
          <div class="meta-textbox">${d.purpose || "No purpose stated."}</div>

          <label>Parameters Requested</label>

        <hr class="meta-divider">

          <div class="meta-item"><label>Resubmitted</label><span>${d.resubmit_requested ? "🔄 Pending" : "No"}</span></div>
        </div>
      </div>
    </div>

    <div class="exec-panel">
      <div class="exec-panel-head">Sequential Stage Desk</div>

      ${wfLocked ? `<div class="banner banner-red" style="margin-bottom:4px;">❌ Rejected at ${fmtTs(d.rejected_at) || "—"}. All stages are locked.${d.verification_failed_reason ? `<br><span style="opacity:0.75;font-size:11px;">Reason: ${d.verification_failed_reason}</span>` : ''}</div>` : ''}

      <!-- STAGE 1 -->
      <div class="stage-card ${wfLocked ? 's-locked' : isVerified ? 's-complete' : isFailedVerif ? 's-warn' : 's-active'}">
        <div class="card-head">
          <span class="stage-num">Stage 1</span>
          <h4>Identity & Credential Verification</h4>
          <span class="card-head-icon">${isVerified ? '✓' : isFailedVerif ? '⚠' : '○'}</span>
        </div>
        <div class="card-body">
          ${isVerified ? `
            <div class="banner banner-green">✓ Verification complete — ${fmtTs(d.verified_at)}</div>
          ` : `
            <p class="inst">Review credentials. Confirm identity or mark as failed and notify the applicant.</p>
            <div class="btn-row" style="margin-bottom:12px;">
              <button class="pbtn pbtn-green" onclick="executeVerification(${d.id})">✓ Confirm & Verify</button>
              <button class="pbtn pbtn-purple" onclick="revealFailureEmailDeck()">⚠ Mark Failed & Draft Email</button>
            </div>
            <div id="failureEmailDeck" style="display:${isFailedVerif ? 'block' : 'none'};" class="collapse-zone">
              <label class="field-label">Reason (Saved to DB)</label>
              <input type="text" id="fail_reason_log" class="finp" value="${d.verification_failed_reason || 'Invalid credential profile — unverified organisation.'}" />
              <label class="field-label">Email Status Line</label>
              <input type="text" id="fail_status_msg" class="finp red" value="Verification failed. Action required for resubmission." />
              <label class="field-label">Final Status Label</label>

              <label class="field-label">Email Body</label>
              <textarea id="fail_email_body" class="fta fta-md">Dear ${d.name},\n\nWe were unable to verify your credentials for request ${d.request_id || 'ELWOIC-REQ'}.\n\nReason: ${d.verification_failed_reason || 'Provided fields do not match organisational records.'}\n\nPlease visit your tracking link to resubmit with corrected details.\n\nBest Regards,\nELWOIC Operations Desk</textarea>
              <button class="pbtn pbtn-purple pbtn-full" onclick="executeFailureEmailDispatch(${d.id})">Dispatch Failure Email & Open Resubmit Portal</button>
            </div>

      </div>

      <!-- STAGE 2 -->
      <div class="stage-card ${wfLocked || !isVerified ? 's-locked' : isPrepared ? 's-complete' : 's-active'}">

          <span class="stage-num">Stage 2</span>
          <h4>Station Data Compilation</h4>
          <span class="card-head-icon">${isPrepared ? '✓' : '○'}</span>

        <div class="card-body">
          ${!isVerified ? `
            <p class="locked-txt">🔒 Locked — Complete Stage 1 to activate.</p>

            <div class="banner banner-blue" style="margin-bottom:10px;">📦 Dataset committed to storage.</div>
            <div class="data-display">${d.prepared_data}</div>
            <div class="btn-row" style="margin-top:10px;">
              <button class="pbtn pbtn-gray" onclick="reactivateDataPrep(${d.id})">Modify Dataset</button>
            </div>
          ` : `
            <p class="inst">Compile weather data. Format: ${d.response_format || 'Text'}.</p>
            <textarea id="workspace_prepared_data" class="fta fta-md" placeholder="[2026-05-30] Temp: 31°C, Humidity: 78%, Rainfall: 4.2mm"></textarea>

          <span class="stage-num">Stage 3</span>
          <h4>Email Dispatch & Delivery</h4>
          <span class="card-head-icon">${isDelivered ? '✓' : '○'}</span>
        </div>
        <div class="card-body">
          ${!isPrepared ? `
            <p class="locked-txt">🔒 Locked — Commit dataset to activate.</p>
          ` : isDelivered ? `
            <div class="banner banner-green">✓ Delivered via EmailJS at ${fmtTs(d.data_sent_at)}</div>
          ` : `
            <p class="inst">Customise all fields before transmitting.</p>
            <label class="field-label">Status Line</label>
            <input type="text" id="workspace_status_message" class="finp green" value="Your requested data is ready and has been delivered." />
            <label class="field-label">Email Body</label>
            <textarea id="workspace_email_body" class="fta fta-lg">${generateDefaultEmailBody(d)}</textarea>
            <label class="field-label">Final Status Label</label>
            <input type="text" id="workspace_final_status" class="finp green" value="Approved — Data Delivered" />
            <button class="pbtn pbtn-green pbtn-full" style="margin-top:2px;" onclick="executeTransmissionDispatch(${d.id})">Transmit Data Package</button>
          `}
        </div>
      </div>

      <!-- STAGE 4 -->
      <div class="stage-card ${wfLocked || !isDelivered ? 's-locked' : isClosed ? 's-closed-case' : 's-active'}">
        <div class="card-head">
          <span class="stage-num">Stage 4</span>
          <h4>Protocol Archive & Case Closure</h4>
          <span class="card-head-icon">${isClosed ? '🔒' : '○'}</span>
        </div>
        <div class="card-body">
          ${isClosed ? `
            <div class="banner banner-gray">🔒 Case sealed and archived. Protocol complete.</div>
          ` : !isDelivered ? `
            <p class="locked-txt">🔒 Locked — Deliver data to activate closure.</p>
          ` : `
            <p class="inst">Finalise and lock this case. This action cannot be undone.</p>
            <button class="pbtn pbtn-red pbtn-full" onclick="executeCaseClosure(${d.id})">Archive & Close Case</button>
          `}
        </div>
      </div>

      <!-- REJECTION DECK -->
      <div class="stage-card ${isRejected ? 's-reject-done' : 's-reject'}">
        <div class="card-head">
          <span class="stage-num">Reject</span>
          <h4 style="color:var(--red);">Reject This Request</h4>
          <span class="card-head-icon">${isRejected ? '❌' : '—'}</span>
        </div>
        <div class="card-body">
          ${isRejected ? `
            <div class="banner banner-red">❌ Rejected at ${fmtTs(d.rejected_at) || "—"}</div>
            <p class="reopen-note">Need to re-evaluate this request? The re-open button will restore it to Pending status, clearing the rejection and allowing the workflow to restart.</p>
            <div class="btn-row" style="margin-top:10px;">
              <button class="pbtn pbtn-gray" onclick="executeReopen(${d.id})">↩ Re-open Request</button>
            </div>
          ` : isClosed ? `
            <div class="banner banner-gray">🔒 Case is already closed and archived.</div>
          ` : `
            ${isVerified ? `<div class="banner banner-orange" style="margin-bottom:10px;">⚠ This request has already passed verification. Rejection will override the approved state.</div>` : ''}
            <button class="pbtn pbtn-red" onclick="revealRejectDeck()">Open Rejection Composer</button>
            <div id="rejectDeck" class="collapse-zone">
              <label class="field-label">Reason (Saved to DB)</label>
              <input type="text" id="reject_reason_log" class="finp" value="Request does not meet ELWOIC data access eligibility criteria." />
              <label class="field-label">Email Status Line</label>
              <input type="text" id="reject_status_msg" class="finp red" value="Your data request has been reviewed and could not be approved." />
              <label class="field-label">Final Status Label</label>
              <input type="text" id="reject_final_lbl" class="finp red" value="Request Rejected" />
              <label class="field-label">Email Body</label>
              <textarea id="reject_email_body" class="fta fta-lg">Dear ${d.name},\n\nThank you for submitting your data request (${d.request_id || 'ELWOIC-REQ'}) to ELWOIC.\n\nAfter careful review, we are unable to fulfil this request at this time.\n\nIf you believe this is in error or wish to submit a revised request, please use the link below.\n\nBest Regards,\nAswanth Krishna K\nFounder & Data Operations Manager, ELWOIC</textarea>
              <label class="field-label">Button URL</label>
              <input type="text" id="reject_btn_url" class="finp" value="https://request.elwoic.in/" />
              <label class="field-label">Button Text</label>
              <input type="text" id="reject_btn_text" class="finp" value="Submit a New Request" />
              <button class="pbtn pbtn-red pbtn-full" onclick="executeRejectionDispatch(${d.id})">Dispatch Rejection Email & Mark Rejected</button>
            </div>
          `}
        </div>
      </div>

    </div>
  </div>`;
}

function generateDefaultEmailBody(d) {
  return `Dear ${d.name || 'Applicant'},\n\nYour data request (${d.request_id || 'ELWOIC-REQ'}) has been fully processed by the ELWOIC Admin Team.\n\nPlease find your requested weather observations below:\n\n──────────────────────────\n${d.prepared_data || ''}\n──────────────────────────\n\nNotes: Data provided under local observation protocols.\n\nBest Regards,\nAswanth Krishna K\nFounder & Data Operations Manager, ELWOIC`;
}

function revealFailureEmailDeck() { document.getElementById("failureEmailDeck").style.display = "block"; }
function revealRejectDeck()       { document.getElementById("rejectDeck").style.display = "block"; }

async function executeVerification(id) {
  const now = new Date().toISOString();
  try {
    await af(`${W}/update`, { method: "POST", body: JSON.stringify({ id, verified_at: now, verification_failed_reason: null, status: "approved_pending" }) });
    patchLocal(id, { verified_at: now, verification_failed_reason: null, status: "approved_pending" });
    showToast("Identity verified", "s");
    buildWorkspaceDOM(cur); updateStats(); render();
  } catch (e) { showToast("Verification sync failed", "e"); }
}

async function executeFailureEmailDispatch(id) {
  const reasonLog = document.getElementById("fail_reason_log").value.trim();
  const statusMsg = document.getElementById("fail_status_msg").value.trim();
  const finalLbl  = document.getElementById("fail_final_lbl").value.trim();
  const emailBody = document.getElementById("fail_email_body").value.trim();
  if (!reasonLog || !emailBody) { showToast("Fill in reason and email body", "w"); return; }
  showToast("Dispatching failure notice…", "w");
  try {
    await emailjs.send(EJS_SVC, EJS_TPL, {
      to_email: cur.email, name: cur.name, requestId: cur.request_id,
      parameters: cur.parameters, request_type: cur.type || "Meteorological Request",
      status_message: statusMsg, message: emailBody, final_status: finalLbl,
      theme_color: "#7c3aed",
      button_url: "https://request.elwoic.in/request-tracking.html",
      button_text: "Update & Resubmit Data Request"
    });
    const now = new Date().toISOString();
    await af(`${W}/update`, { method: "POST", body: JSON.stringify({ id, verified_at: now, verification_failed_reason: reasonLog, status: "verification_failed", resubmit_requested: true }) });
    patchLocal(id, { verified_at: now, verification_failed_reason: reasonLog, status: "verification_failed", resubmit_requested: true });
    showToast("Failure notice dispatched. Resubmit window open.", "s");
    closeM("oView"); updateStats(); render();
  } catch (e) { showToast("EmailJS error", "e"); }
}

async function executeDataPackaging(id) {
  const el = document.getElementById("workspace_prepared_data");
  const packedData = el ? el.value.trim() : "";
  if (!packedData) { showToast("Data field cannot be blank", "w"); return; }
  const now = new Date().toISOString();
  try {
    await af(`${W}/update`, { method: "POST", body: JSON.stringify({ id, data_prep_at: now, prepared_data: packedData }) });
    patchLocal(id, { data_prep_at: now, prepared_data: packedData });
    showToast("Dataset sealed", "s");
    buildWorkspaceDOM(cur); updateStats(); render();
  } catch (e) { showToast("Storage failed", "e"); }
}

function reactivateDataPrep(id) { cur.data_prep_at = null; buildWorkspaceDOM(cur); }

async function executeTransmissionDispatch(id) {
  const statusLine = document.getElementById("workspace_status_message").value.trim();
  const msgText    = document.getElementById("workspace_email_body").value.trim();
  const finalTxt   = document.getElementById("workspace_final_status").value.trim();
  if (!msgText || !statusLine || !finalTxt) { showToast("Fields cannot be empty", "w"); return; }
  showToast("Transmitting…", "w");
  try {
    await emailjs.send(EJS_SVC, EJS_TPL, {
      to_email: cur.email, name: cur.name, requestId: cur.request_id,
      parameters: cur.parameters, request_type: cur.type || "Meteorological Request",
      status_message: statusLine, message: msgText, final_status: finalTxt,
      theme_color: "#16a34a",
      button_url: "https://elwoic.in/",
      button_text: "Visit ELWOIC Homepage"
    });
    const now = new Date().toISOString();
    await af(`${W}/update`, { method: "POST", body: JSON.stringify({ id, data_sent_at: now, status: "approved" }) });
    patchLocal(id, { data_sent_at: now, status: "approved" });
    showToast("Data package delivered", "s");
    buildWorkspaceDOM(cur); updateStats(); render();
  } catch (e) { showToast("Transmission failed", "e"); }
}

async function executeCaseClosure(id) {
  if (!confirm("Permanently lock and archive this case?")) return;
  const now = new Date().toISOString();
  try {
    await af(`${W}/update`, { method: "POST", body: JSON.stringify({ id, case_closed_at: now }) });
    patchLocal(id, { case_closed_at: now });
    showToast("Case locked and archived 🔒", "s");
    buildWorkspaceDOM(cur); updateStats(); render();
  } catch (e) { showToast("Closure failed", "e"); }
}

async function executeRejectionDispatch(id) {
  const reasonLog = document.getElementById("reject_reason_log").value.trim();
  const statusMsg = document.getElementById("reject_status_msg").value.trim();
  const finalLbl  = document.getElementById("reject_final_lbl").value.trim();
  const emailBody = document.getElementById("reject_email_body").value.trim();
  const btnUrl    = document.getElementById("reject_btn_url").value.trim();
  const btnText   = document.getElementById("reject_btn_text").value.trim();
  if (!reasonLog || !emailBody) { showToast("Fill in reason and email body", "w"); return; }
  showToast("Dispatching rejection notice…", "w");
  try {
    await emailjs.send(EJS_SVC, EJS_TPL, {
      to_email: cur.email, name: cur.name, requestId: cur.request_id,
      parameters: cur.parameters, request_type: cur.type || "Meteorological Request",
      status_message: statusMsg, message: emailBody, final_status: finalLbl,
      theme_color: "#dc2626", button_url: btnUrl, button_text: btnText
    });
    const now = new Date().toISOString();
    await af(`${W}/update`, { method: "POST", body: JSON.stringify({ id, status: "rejected", rejected_at: now, verification_failed_reason: reasonLog }) });
    patchLocal(id, { status: "rejected", rejected_at: now, verification_failed_reason: reasonLog });
    showToast("Rejection dispatched", "s");
    closeM("oView"); updateStats(); render();
  } catch (e) { showToast("Rejection dispatch failed", "e"); }
}

async function executeReopen(id) {
  if (!confirm("Re-open this rejected request and restore it to Pending?")) return;
  try {
    await af(`${W}/update`, { method: "POST", body: JSON.stringify({ id, status: "Pending", rejected_at: null, verification_failed_reason: null }) });
    patchLocal(id, { status: "Pending", rejected_at: null, verification_failed_reason: null });
    showToast("Request re-opened and set to Pending", "s");
    buildWorkspaceDOM(cur); updateStats(); render();
  } catch (e) { showToast("Re-open failed", "e"); }
}

async function executeDirectDeletion(id) {
  if (!confirm("Permanently delete this record from the database?")) return;
  try {
    await af(`${W}/delete`, { method: "POST", body: JSON.stringify({ id }) });
    allData = allData.filter(x => x.id !== id);
    showToast("Record deleted", "w");
    updateStats(); render();
  } catch (e) { showToast("Deletion failed", "e"); }
}

function patchLocal(id, patch) {
  const i = allData.findIndex(x => x.id == id);
  if (i !== -1) Object.assign(allData[i], patch);
  if (cur.id == id) Object.assign(cur, patch);
}

function openM(id)  { document.getElementById(id).classList.add("open"); }
function closeM(id) { document.getElementById(id).classList.remove("open"); }

function showToast(msg, type = "s") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `toast t-${type} show`;
  setTimeout(() => t.classList.remove("show"), 3000);
}
</script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
