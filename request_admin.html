<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ELWOIC Admin Panel</title>

<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; }
.container { max-width:1200px; margin:auto; background:white; padding:20px; border-radius:10px; }
h2 { text-align:center; }

.controls { display:flex; gap:10px; margin-top:10px; flex-wrap:wrap; }
input, select { padding:8px; }

.table { width:100%; border-collapse:collapse; margin-top:20px; }
.table th,.table td { border:1px solid #ccc; padding:8px; }
.table th { background:#000; color:#fff; }

button { padding:6px 10px; cursor:pointer; border:none; margin:2px; }
.approve { background:green; color:white; }
.reject { background:red; color:white; }
.delete { background:#333; color:white; }
.view { background:#007bff; color:white; }
.cancel { background:gray; color:white; }

.modal {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.6); display:none; justify-content:center; align-items:center;
}
.modal-content {
  background:white; padding:20px; width:500px; max-height:90vh; overflow:auto; border-radius:10px;
}
textarea { width:100%; height:150px; }
</style>
</head>

<body>
<div class="container">
<h2>ELWOIC Admin Panel</h2>
<button onclick="logout()">Logout</button>

<div class="controls">
  <input type="text" id="search" placeholder="Search name/email/requestId">
  <select id="filterStatus">
    <option value="all">All</option>
    <option value="pending">Pending</option>
    <option value="approved">Approved</option>
    <option value="rejected">Rejected</option>
  </select>
  <select id="sort">
    <option value="latest">Latest First</option>
    <option value="pending">Pending First</option>
  </select>
</div>

<table class="table">
<thead>
<tr>
<th>ID</th><th>Name</th><th>Email</th><th>Status</th><th>Action</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<!-- VIEW MODAL -->
<div class="modal" id="viewModal">
<div class="modal-content" id="viewContent"></div>
</div>

<!-- REPLY MODAL -->
<div class="modal" id="replyModal">
<div class="modal-content">
  <h3 id="replyTitle"></h3>
  <textarea id="replyText"></textarea>
  <br><br>
  <button onclick="sendReply()">Send</button>
  <button class="cancel" onclick="closeModal('replyModal')">Cancel</button>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script>
// MAIN DB (requests)
const app1 = firebase.initializeApp({
 apiKey:"AIzaSyCCGNGzhBWETU0gyTUeA2wUVnlQbl2-khU",
 authDomain:"data-request-161d5.firebaseapp.com",
 databaseURL:"https://data-request-161d5-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const db = app1.database();

// WEATHER DB
const app2 = firebase.initializeApp({
 apiKey:"AIzaSyALWX2l-9_6izgvt_JerJjTDbgNc5oT2VQ",
 databaseURL:"https://report-20d26-default-rtdb.asia-southeast1.firebasedatabase.app"
},"weather");

const weatherDb = app2.database();

emailjs.init("p5ikS_d-yFWcyzvac");

// VARIABLES
let allData = [];
let weatherData = [];

let currentKey, currentEmail, currentName, currentRequestId;
let currentParameters, currentType;
let currentDate, currentTime, currentFrom, currentTo;

const tableBody = document.getElementById("tableBody");

// LOAD REQUESTS
db.ref("requests").on("value", snap=>{
  allData=[];
  snap.forEach(c=>{
    let d=c.val(); d.key=c.key;
    allData.push(d);
  });
  render();
});
const auth = firebase.auth();

auth.onAuthStateChanged(user => {
  if (!user) {
    // Not logged in → go to login page
    window.location.href = "request_admin_login.html";
  } else {
    console.log("Logged in as:", user.email);
  }
});
const allowedEmails = [
  "your@email.com",
  "another@email.com"
];

auth.onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "request_admin_login.html";
    return;
  }

  if (!allowedEmails.includes(user.email)) {
    alert("Access Denied");
    auth.signOut();
    window.location.href = "request_admin_login.html";
  }
});

// LOAD WEATHER
weatherDb.ref("weather_logs").on("value", snap=>{
  weatherData=[];
  snap.forEach(c=>{
    let d = c.val();
    weatherData.push(d);
  });
});

// RENDER TABLE
function render(){
 let search = searchBox.value.toLowerCase();
 let status = filterStatus.value;
 let sort = sortSelect.value;

 let data = allData.filter(d=>{
   return (
     (status==="all" || d.status===status) &&
     (d.name.toLowerCase().includes(search) ||
      d.email.toLowerCase().includes(search) ||
      d.requestId.includes(search))
   );
 });

 if(sort==="latest") data.sort((a,b)=> b.created_at.localeCompare(a.created_at));
 if(sort==="pending") data.sort((a,b)=> (a.status==='pending'?-1:1));

 tableBody.innerHTML="";
 data.forEach(d=>{
   tableBody.innerHTML += `
   <tr>
    <td>${d.requestId}</td>
    <td>${d.name}</td>
    <td>${d.email}</td>
    <td>${d.status}</td>
    <td>
      <button class="view" onclick="view('${d.key}')">View</button>
      <button class="delete" onclick="del('${d.key}')">Delete</button>
    </td>
   </tr>`;
 });
}

const searchBox = document.getElementById("search");
const filterStatus = document.getElementById("filterStatus");
const sortSelect = document.getElementById("sort");

searchBox.oninput = filterStatus.onchange = sortSelect.onchange = render;

// VIEW
function view(key){
    let d = allData.find(x => x.key === key);
    let isDone = d.status === "approved" || d.status === "rejected";

    let html = `
    <div style="border-bottom: 2px solid #000; margin-bottom: 15px; padding-bottom: 10px;">
        <h2 style="margin:0;">Request Details</h2>
        <small>ID: ${d.requestId}</small>
    </div>
    <p><b>Name:</b> ${d.name}</p>
    <p><b>Email:</b> ${d.email}</p>
    <p><b>Phone:</b> ${d.phone || "Not Provided"}</p>
    <p><b>Purpose:</b> ${d.purpose}</p>
    <p><b>Parameters:</b> ${d.parameters}</p>
    <p><b>Request Type:</b> ${d.type}</p>
    <hr>
    <p><b>Specific Date/Time:</b> ${d.date || "-"} | ${d.time || "-"}</p>
    <p><b>Range:</b> From ${d.from_date || "-"} To ${d.to_date || "-"}</p>
    <p><b>Status:</b> <span style="text-transform:uppercase; font-weight:bold;">${d.status}</span></p>
    <br>
    <div style="display:flex; gap:10px;">
        <button class="approve" ${isDone?"disabled":""} onclick="openReply('${d.key}','approved')">Approve & Send Data</button>
        <button class="reject" ${isDone?"disabled":""} onclick="openReply('${d.key}','rejected')">Reject Request</button>
        <button class="cancel" onclick="closeModal('viewModal')">Close</button>
    </div>`;

    document.getElementById("viewContent").innerHTML = html;
    document.getElementById("viewModal").style.display = "flex";
}
// DELETE
function del(key){
 if(confirm("Delete?")) db.ref("requests/"+key).remove();
}

// OPEN REPLY + AUTO DATA
function openReply(key, status) {
    let d = allData.find(x => x.key === key);
    currentKey = key;
    currentEmail = d.email;
    currentName = d.name;
    currentRequestId = d.requestId;
    currentParameters = (d.parameters || "").toLowerCase();
    
    document.getElementById("replyTitle").innerText = status.toUpperCase();

    let messageBody = "";

    if (status === "approved") {
        let matchedData = null;
        let searchDate = "";

        // --- STEP 1: CONVERT DATE FORMAT ---
        // Converts "2026-03-20" to "20/03/2026" to match Weather DB
        if (d.date) {
            let parts = d.date.split("-");
            searchDate = `${parts[2]}/${parts[1]}/${parts[0]}`;
        }

        // --- STEP 2: ROUND TIME (30-min intervals) ---
        let roundedTime = "";
        if (d.time) {
            let [hrs, mins] = d.time.split(":").map(Number);
            if (mins < 15) mins = "00";
            else if (mins < 45) mins = "30";
            else {
                mins = "00";
                hrs = (hrs + 1) % 24;
            }
            roundedTime = String(hrs).padStart(2, '0') + ":" + mins;
        }

        // --- STEP 3: SEARCH DATABASE ---
        matchedData = weatherData.find(w => {
            let ts = w.timestamp_ist || ""; // e.g. "20/03/2026, 13:30:05"
            return ts.includes(searchDate) && ts.includes(roundedTime);
        });

        // --- STEP 4: FORMAT MESSAGE ---
        if (matchedData) {
            messageBody = `As requested, here is the weather data for ${searchDate} at approximately ${roundedTime}:\n\n`;
            
            if (currentParameters.includes("temp")) 
                messageBody += `🌡 Temperature: ${matchedData.consensus_temp || matchedData.temp_c}°C\n`;
            
            if (currentParameters.includes("humidity")) 
                messageBody += `💧 Humidity: ${matchedData.consensus_humidity || matchedData.humidity}%\n`;
            
            if (currentParameters.includes("aqi") || currentParameters.includes("pm")) {
                messageBody += `😷 AQI: ${matchedData.aqi} (${matchedData.aqi_status})\n`;
                messageBody += `🌫 PM2.5: ${matchedData.pm25} µg/m³\n`;
            }

            if (currentParameters.includes("pressure"))
                messageBody += `📊 Pressure: ${matchedData.pressure_hpa} hPa\n`;

            if (currentParameters.includes("condition"))
                messageBody += `☁ Condition: ${matchedData.condition}\n`;

        } else {
            messageBody = "The requested data for " + searchDate + " at " + roundedTime + " was not found in our logs. Please contact us if you believe this is an error.";
        }
    } else {
        messageBody = "Your request for weather data has been reviewed and unfortunately cannot be approved at this time.";
    }

    // Populate textarea
    document.getElementById("replyText").value = 
`Dear ${currentName},

${messageBody}

Thank you for contacting ELWOIC.
Best Regards,
Admin Team, ELWOIC`;

    window.currentStatus = status;
    document.getElementById("replyModal").style.display = "flex";
}
// SEND
function sendReply(){
 let msg = replyText.value;

 emailjs.send("service_3br5mjc","template_tzvvv1c",{
  email: currentEmail,
  name: currentName,
  requestId: currentRequestId,
  parameters: currentParameters,
  type: currentType,
  message: msg,
  status_message: window.currentStatus==="approved"
    ? "Your data request has been APPROVED by ELWOIC."
    : "Your data request has been REJECTED by ELWOIC."
 });

 db.ref("requests/"+currentKey).update({
   status: window.currentStatus
 });

 closeModal('replyModal');
 closeModal('viewModal');
}
function logout(){
  auth.signOut().then(()=>{
    window.location.href = "request_admin_login.html";
  });
}

function closeModal(id){
 document.getElementById(id).style.display="none";
}
</script>

</body>
</html>
