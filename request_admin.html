<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELWOIC Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Source+Serif+4:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #f7f8fa;
  --surface:   #ffffff;
  --surface2:  #f1f3f7;
  --border:    #dde2ec;
  --border2:   #c8d0e0;
  --text:      #1a2236;
  --muted:     #7a8aaa;
  --accent:    #1d4ed8;
  --green:     #16a34a;
  --red:       #dc2626;
  --orange:    #d97706;
  --blue:      #1d4ed8;
  --teal:      #0891b2;
  --mono:      'IBM Plex Mono', monospace;
  --serif:     'Source Serif 4', Georgia, serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--serif);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── LOGIN ─────────────────────────────────────── */
#loginScreen {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: var(--bg);
}

.login-box {
  width: 380px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 48px 40px;
  text-align: center;
  box-shadow: 0 4px 24px rgba(0,0,0,0.07);
}

.login-logo {
  font-family: var(--mono);
  font-size: 30px;
  font-weight: 600;
  letter-spacing: 5px;
  color: var(--text);
  margin-bottom: 4px;
}

.login-sub {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.login-divider {
  width: 40px;
  height: 2px;
  background: var(--accent);
  margin: 0 auto 32px;
}

.login-box input[type="password"] {
  width: 100%;
  padding: 12px 16px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 14px;
  margin-bottom: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.login-box input[type="password"]:focus { border-color: var(--accent); }

.login-box .login-btn {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 6px;
  font-family: var(--serif);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 1px;
  transition: background 0.2s;
}
.login-box .login-btn:hover { background: #1e40af; }

.login-error {
  color: var(--red);
  font-size: 12px;
  margin-top: 12px;
  display: none;
}

/* ── APP ───────────────────────────────────────── */
#appScreen { display: none; }

.topbar {
  background: var(--surface);
  border-bottom: 2px solid var(--border);
  padding: 0 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
}

.topbar-left { display: flex; align-items: center; gap: 16px; }

.topbar-title {
  font-family: var(--mono);
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 4px;
  color: var(--text);
}

.topbar-sep {
  width: 1px;
  height: 20px;
  background: var(--border);
}

.topbar-sub {
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.5px;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.stat-chip {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  font-family: var(--mono);
}

.chip-pending  { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
.chip-approved { background: #dcfce7; color: #14532d; border: 1px solid #86efac; }
.chip-rejected { background: #fee2e2; color: #7f1d1d; border: 1px solid #fca5a5; }

.logout-btn {
  padding: 6px 16px;
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: 6px;
  color: var(--muted);
  font-size: 12px;
  cursor: pointer;
  font-family: var(--serif);
  transition: all 0.2s;
}
.logout-btn:hover { border-color: var(--red); color: var(--red); }

.main { padding: 28px 32px; }

/* ── CONTROLS ──────────────────────────────────── */
.controls {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  align-items: center;
}

.controls input,
.controls select {
  padding: 9px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--serif);
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
}
.controls input { flex: 1; min-width: 220px; }
.controls input:focus,
.controls select:focus { border-color: var(--accent); }

.refresh-btn {
  padding: 9px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--muted);
  font-size: 13px;
  cursor: pointer;
  font-family: var(--serif);
  transition: all 0.2s;
}
.refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── TABLE ─────────────────────────────────────── */
.table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 1px 6px rgba(0,0,0,0.04);
}

table { width: 100%; border-collapse: collapse; }

thead tr {
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
}

th {
  padding: 11px 16px;
  text-align: left;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  font-family: var(--mono);
}

tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.12s;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: #f5f7ff; }

td {
  padding: 12px 16px;
  font-size: 13px;
  vertical-align: middle;
}

.td-id   { font-family: var(--mono); font-size: 11px; color: var(--muted); }
.td-date { font-family: var(--mono); font-size: 11px; color: var(--muted); }

/* Badges */
.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  font-family: var(--mono);
}
.badge-Pending          { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
.badge-approved         { background: #dcfce7; color: #14532d; border: 1px solid #86efac; }
.badge-approved_pending { background: #dbeafe; color: #1e3a8a; border: 1px solid #93c5fd; }
.badge-rejected         { background: #fee2e2; color: #7f1d1d; border: 1px solid #fca5a5; }

/* Buttons */
.btn {
  padding: 5px 12px;
  border: none;
  border-radius: 5px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--serif);
  transition: opacity 0.15s;
  margin-right: 4px;
}
.btn:hover { opacity: 0.82; }
.btn-view   { background: var(--accent); color: #fff; }
.btn-delete { background: transparent; color: var(--muted); border: 1px solid var(--border); }
.btn-delete:hover { color: var(--red); border-color: var(--red); opacity: 1; }

.empty-row td {
  text-align: center;
  padding: 48px;
  color: var(--muted);
  font-size: 13px;
}

/* ── MODAL ─────────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(10,20,40,0.45);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 20px;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  width: 100%;
  max-width: 580px;
  max-height: 92vh;
  overflow-y: auto;
  box-shadow: 0 8px 40px rgba(0,0,0,0.14);
}

.modal-header {
  padding: 18px 24px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--surface2);
  border-radius: 12px 12px 0 0;
}

.modal-header h3 {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 2px;
  color: var(--text);
  text-transform: uppercase;
}

.modal-close {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 20px;
  cursor: pointer;
  line-height: 1;
}
.modal-close:hover { color: var(--text); }

.modal-body { padding: 22px 24px; }

.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 16px;
}

.detail-item label {
  display: block;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 3px;
  font-family: var(--mono);
}
.detail-item span { font-size: 13px; color: var(--text); }

.detail-full { margin-bottom: 14px; }
.detail-full label {
  display: block;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 4px;
  font-family: var(--mono);
}

.detail-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 14px;
  font-size: 13px;
  color: var(--text);
  line-height: 1.6;
}

.divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

.modal-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 16px;
}

.btn-approve      { background: var(--green);  color: #fff; padding: 9px 20px; font-size: 12px; border-radius: 6px; }
.btn-reject       { background: var(--red);    color: #fff; padding: 9px 20px; font-size: 12px; border-radius: 6px; }
.btn-datasent     { background: var(--teal);   color: #fff; padding: 9px 20px; font-size: 12px; border-radius: 6px; }
.btn-reopen       { background: var(--orange); color: #fff; padding: 9px 20px; font-size: 12px; border-radius: 6px; }
.btn-cancel       { background: var(--surface2); color: var(--muted); border: 1px solid var(--border2); padding: 9px 20px; font-size: 12px; border-radius: 6px; }

/* Reply modal specific */
.reply-section-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  font-family: var(--mono);
  margin-bottom: 6px;
  display: block;
}

.reply-input {
  width: 100%;
  padding: 10px 14px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--serif);
  font-size: 13px;
  outline: none;
  margin-bottom: 14px;
  transition: border-color 0.2s;
}
.reply-input:focus { border-color: var(--accent); }

.reply-textarea {
  width: 100%;
  height: 130px;
  padding: 10px 14px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--serif);
  font-size: 13px;
  line-height: 1.6;
  resize: vertical;
  outline: none;
  margin-bottom: 6px;
}
.reply-textarea:focus { border-color: var(--accent); }

.pending-option {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  background: #eff6ff;
  border: 1px solid #bfdbfe;
  border-radius: 6px;
  padding: 12px 14px;
  margin-bottom: 16px;
}
.pending-option input[type="checkbox"] { margin-top: 2px; accent-color: var(--accent); }
.pending-option label { font-size: 13px; color: var(--text); cursor: pointer; line-height: 1.5; }

/* Confirm overlay */
.confirm-box {
  background: #fff7ed;
  border: 1px solid #fed7aa;
  border-radius: 8px;
  padding: 16px 18px;
  margin-bottom: 16px;
}
.confirm-box p { font-size: 13px; color: #7c2d12; line-height: 1.6; }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  padding: 12px 22px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  z-index: 9999;
  opacity: 0;
  transform: translateY(8px);
  transition: all 0.3s;
  pointer-events: none;
  font-family: var(--serif);
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast-success { background: var(--green); color: #fff; }
.toast-error   { background: var(--red);   color: #fff; }
.toast-warn    { background: var(--orange); color: #fff; }
</style>
</head>
<body>

<!-- ── LOGIN ──────────────────────────────────────────── -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">ELWOIC</div>
    <div class="login-sub">Admin Panel</div>
    <div class="login-divider"></div>
    <input type="password" id="passwordInput" placeholder="Enter password"
           onkeydown="if(event.key==='Enter') login()">
    <button class="login-btn" onclick="login()">Sign In</button>
    <div class="login-error" id="loginError">Incorrect password. Try again.</div>
  </div>
</div>

<!-- ── APP ────────────────────────────────────────────── -->
<div id="appScreen">

  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-title">ELWOIC</div>
      <div class="topbar-sep"></div>
      <div class="topbar-sub">Data Request Admin Panel</div>
    </div>
    <div class="topbar-right">
      <span class="stat-chip chip-pending"  id="statPending">— Pending</span>
      <span class="stat-chip chip-approved" id="statApproved">— Approved</span>
      <span class="stat-chip chip-rejected" id="statRejected">— Rejected</span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="main">
    <div class="controls">
      <input type="text" id="search" placeholder="Search name, email or request ID…" oninput="render()">
      <select id="filterStatus" onchange="render()">
        <option value="all">All Status</option>
        <option value="Pending">Pending</option>
        <option value="approved">Approved</option>
        <option value="approved_pending">Approved (Data Pending)</option>
        <option value="rejected">Rejected</option>
      </select>
      <select id="sortBy" onchange="render()">
        <option value="latest">Latest First</option>
        <option value="oldest">Oldest First</option>
        <option value="pending">Pending First</option>
      </select>
      <button class="refresh-btn" onclick="loadRequests()">↻ Refresh</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Request ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Category</th>
            <th>Submitted</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr class="empty-row"><td colspan="7">Loading requests…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- ── VIEW MODAL ─────────────────────────────────────── -->
<div class="modal-overlay" id="viewOverlay">
  <div class="modal">
    <div class="modal-header">
      <h3>Request Details</h3>
      <button class="modal-close" onclick="closeModal('viewOverlay')">×</button>
    </div>
    <div class="modal-body" id="viewBody"></div>
  </div>
</div>

<!-- ── REPLY MODAL ────────────────────────────────────── -->
<div class="modal-overlay" id="replyOverlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="replyTitle">Send Reply</h3>
      <button class="modal-close" onclick="closeModal('replyOverlay')">×</button>
    </div>
    <div class="modal-body">

      <!-- Confirm warning for status change (shown when needed) -->
      <div class="confirm-box" id="confirmWarning" style="display:none;">
        <p id="confirmWarningText"></p>
      </div>

      <!-- Pending option (approve only) -->
      <div class="pending-option" id="pendingOption" style="display:none;">
        <input type="checkbox" id="dataPendingCheck">
        <label for="dataPendingCheck">
          <strong>Data not ready yet</strong><br>
          Notify user that request is approved but data is still being processed.
        </label>
      </div>

      <!-- Status message (shown to user as headline) -->
      <label class="reply-section-label">Status Message <span style="color:#888;font-size:10px;">(shown prominently in email)</span></label>
      <input type="text" class="reply-input" id="statusMessageInput" placeholder="e.g. Your request has been approved.">

      <!-- Final status line -->
      <label class="reply-section-label">Final Status Line <span style="color:#888;font-size:10px;">(shown in summary table)</span></label>
      <input type="text" class="reply-input" id="finalStatusInput" placeholder="e.g. Approved — Data will be sent by 27 May 2026">

      <!-- Main message body -->
      <label class="reply-section-label">Message Body</label>
      <textarea class="reply-textarea" id="replyText"></textarea>

      <div class="modal-actions">
        <button class="btn btn-approve" id="sendBtn" onclick="sendReply()">Send &amp; Update</button>
        <button class="btn btn-cancel"  onclick="closeModal('replyOverlay')">Cancel</button>
      </div>
    </div>
  </div>
</div>

<!-- ── TOAST ──────────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<script>
// ── Config ────────────────────────────────────────────
const ADMIN_PASSWORD  = "YOUR_ADMIN_PASSWORD";
const WORKER_URL      = "https://data-admin-request-handler.bold-waterfall-0d01.workers.dev";
const EMAILJS_SERVICE = "service_qpz7vpz";
const EMAILJS_TEMPLATE= "template_gejp4qq";
const EMAILJS_KEY     = "Bd-no1cWjcYLmCKIW";

// ── Auth ──────────────────────────────────────────────
function login() {
  const pw = document.getElementById("passwordInput").value;
  if (pw === ADMIN_PASSWORD) {
    sessionStorage.setItem("elwoic_admin", "1");
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("appScreen").style.display   = "block";
    loadRequests();
  } else {
    document.getElementById("loginError").style.display = "block";
  }
}

function logout() {
  sessionStorage.removeItem("elwoic_admin");
  location.reload();
}

window.addEventListener("load", () => {
  if (sessionStorage.getItem("elwoic_admin") === "1") {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("appScreen").style.display   = "block";
    loadRequests();
  }
  emailjs.init(EMAILJS_KEY);
});

// ── Data ──────────────────────────────────────────────
let allData = [];
let current = {};

async function loadRequests() {
  try {
    const res  = await fetch(`${WORKER_URL}/requests`);
    const data = await res.json();
    allData = data;
    updateStats();
    render();
  } catch (err) {
    showToast("Failed to load requests", "error");
  }
}

function updateStats() {
  document.getElementById("statPending").textContent  = allData.filter(d => d.status === "Pending").length  + " Pending";
  document.getElementById("statApproved").textContent = allData.filter(d => d.status === "approved" || d.status === "approved_pending").length + " Approved";
  document.getElementById("statRejected").textContent = allData.filter(d => d.status === "rejected").length + " Rejected";
}

function render() {
  const search = document.getElementById("search").value.toLowerCase();
  const status = document.getElementById("filterStatus").value;
  const sort   = document.getElementById("sortBy").value;

  let data = allData.filter(d => {
    const matchStatus = status === "all" || d.status === status;
    const matchSearch = (d.name       || "").toLowerCase().includes(search) ||
                        (d.email      || "").toLowerCase().includes(search) ||
                        (d.request_id || "").toLowerCase().includes(search);
    return matchStatus && matchSearch;
  });

  if (sort === "latest")  data.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
  if (sort === "oldest")  data.sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
  if (sort === "pending") data.sort((a,b) => (a.status === "Pending" ? -1 : 1));

  const body = document.getElementById("tableBody");

  if (data.length === 0) {
    body.innerHTML = `<tr class="empty-row"><td colspan="7">No requests found.</td></tr>`;
    return;
  }

  const statusLabels = {
    "Pending":          "Pending",
    "approved":         "Approved",
    "approved_pending": "Appr. Pending",
    "rejected":         "Rejected"
  };

  body.innerHTML = data.map(d => {
    const date  = d.created_at
      ? new Date(d.created_at).toLocaleDateString("en-IN", { day:"2-digit", month:"short", year:"numeric" })
      : "—";
    const label = statusLabels[d.status] || d.status;
    return `
    <tr>
      <td class="td-id">${d.request_id || "—"}</td>
      <td>${d.name || "—"}</td>
      <td>${d.email || "—"}</td>
      <td>${d.purpose_category || "—"}</td>
      <td class="td-date">${date}</td>
      <td><span class="badge badge-${d.status}">${label}</span></td>
      <td>
        <button class="btn btn-view"   onclick="viewRequest(${d.id})">View</button>
        <button class="btn btn-delete" onclick="deleteRequest(${d.id})">Delete</button>
      </td>
    </tr>`;
  }).join("");
}

// ── View ──────────────────────────────────────────────
function viewRequest(id) {
  const d = allData.find(x => x.id == id);
  if (!d) return;
  current = d;

  const date = d.created_at ? new Date(d.created_at).toLocaleString("en-IN") : "—";

  // Smart action buttons based on current status
  let actionBtns = "";

  if (d.status === "Pending") {
    actionBtns = `
      <button class="btn btn-approve" onclick="openReply('approved')">Approve</button>
      <button class="btn btn-reject"  onclick="openReply('rejected')">Reject</button>`;

  } else if (d.status === "approved_pending") {
    actionBtns = `
      <button class="btn btn-datasent" onclick="openReply('mark_sent')">Mark Data Sent</button>
      <button class="btn btn-reject"   onclick="openReply('reject_from_approved')">Reject</button>`;

  } else if (d.status === "approved") {
    actionBtns = `<span style="font-size:12px;color:var(--muted);font-family:var(--mono);">✓ Completed — no further action needed</span>`;

  } else if (d.status === "rejected") {
    actionBtns = `
      <button class="btn btn-reopen" onclick="openReply('reopen')">Re-open Request</button>`;
  }

  document.getElementById("viewBody").innerHTML = `
    <div class="detail-grid">
      <div class="detail-item"><label>Request ID</label><span style="font-family:var(--mono);font-size:11px;">${d.request_id || "—"}</span></div>
      <div class="detail-item"><label>Submitted</label><span>${date}</span></div>
      <div class="detail-item"><label>Name</label><span>${d.name || "—"}</span></div>
      <div class="detail-item"><label>Email</label><span>${d.email || "—"}</span></div>
      <div class="detail-item"><label>Phone</label><span>${d.phone || "Not Provided"}</span></div>
      <div class="detail-item"><label>Status</label><span><span class="badge badge-${d.status}">${d.status}</span></span></div>
      <div class="detail-item"><label>Organisation</label><span>${d.organisation || "Not Provided"}</span></div>
      <div class="detail-item"><label>Designation</label><span>${d.designation || "Not Provided"}</span></div>
    </div>
    <hr class="divider">
    <div class="detail-full"><label>Purpose Category</label><span>${d.purpose_category || "—"}</span></div>
    <div class="detail-full"><label>Purpose</label><div class="detail-box">${d.purpose || "—"}</div></div>
    <div class="detail-full" style="margin-top:12px;"><label>Parameters Requested</label><div class="detail-box">${d.parameters || "—"}</div></div>
    <div class="detail-grid" style="margin-top:12px;">
      <div class="detail-item"><label>Request Type</label><span>${d.type || "—"}</span></div>
      <div class="detail-item"><label>Response Format</label><span>${d.response_format || "—"}</span></div>
      <div class="detail-item"><label>Date</label><span>${d.date || "—"}</span></div>
      <div class="detail-item"><label>Time</label><span>${d.time || "—"}</span></div>
      <div class="detail-item"><label>From Date</label><span>${d.from_date || "—"}</span></div>
      <div class="detail-item"><label>To Date</label><span>${d.to_date || "—"}</span></div>
    </div>
    <div class="detail-full" style="margin-top:12px;"><label>Additional Details</label><div class="detail-box">${d.additional_details || "None"}</div></div>
    <hr class="divider">
    <div class="modal-actions">
      ${actionBtns}
      <button class="btn btn-cancel" onclick="closeModal('viewOverlay')">Close</button>
    </div>`;

  openModal("viewOverlay");
}

// ── Reply ─────────────────────────────────────────────
function openReply(action) {
  window.replyAction = action;
  const d = current;

  // Reset fields
  document.getElementById("confirmWarning").style.display  = "none";
  document.getElementById("pendingOption").style.display   = "none";
  document.getElementById("dataPendingCheck").checked      = false;

  // Set defaults based on action
  if (action === "approved") {
    document.getElementById("replyTitle").textContent        = "Approve Request";
    document.getElementById("pendingOption").style.display   = "flex";
    document.getElementById("statusMessageInput").value      = "Your data request has been Approved.";
    document.getElementById("finalStatusInput").value        = "Approved — Data will be sent shortly.";
    document.getElementById("replyText").value               =
      `Dear ${d.name},\n\nYour data request (${d.request_id}) has been approved.\n\nThe requested data for: ${d.parameters} will be sent to you shortly.\n\nBest Regards,\nAdmin Team, ELWOIC`;

  } else if (action === "mark_sent") {
    document.getElementById("replyTitle").textContent        = "Mark Data as Sent";
    document.getElementById("statusMessageInput").value      = "Your requested data has been sent.";
    document.getElementById("finalStatusInput").value        = "Approved — Data Sent";
    document.getElementById("replyText").value               =
      `Dear ${d.name},\n\nThe data for your request (${d.request_id}) has been processed and sent to you.\n\nPlease check your email for the attached data.\n\nBest Regards,\nAdmin Team, ELWOIC`;

  } else if (action === "rejected") {
    document.getElementById("replyTitle").textContent        = "Reject Request";
    document.getElementById("statusMessageInput").value      = "Your data request could not be approved at this time.";
    document.getElementById("finalStatusInput").value        = "Rejected";
    document.getElementById("replyText").value               =
      `Dear ${d.name},\n\nWe regret to inform you that your data request (${d.request_id}) could not be approved at this time.\n\nIf you have any questions, please contact us at info@elwoic.in.\n\nBest Regards,\nAdmin Team, ELWOIC`;

  } else if (action === "reject_from_approved") {
    document.getElementById("replyTitle").textContent = "Reject Approved Request";
    document.getElementById("confirmWarning").style.display = "block";
    document.getElementById("confirmWarningText").textContent =
      "⚠️ This request was already approved. Rejecting it will notify the user that the approval has been withdrawn. Please provide a clear reason in the message below.";
    document.getElementById("statusMessageInput").value = "Your approved request has been withdrawn.";
    document.getElementById("finalStatusInput").value   = "Rejected — Approval Withdrawn";
    document.getElementById("replyText").value          =
      `Dear ${d.name},\n\nWe regret to inform you that your previously approved request (${d.request_id}) has been withdrawn due to the following reason:\n\n[Please state the reason here]\n\nWe apologise for the inconvenience. Please contact us at info@elwoic.in for further clarification.\n\nBest Regards,\nAdmin Team, ELWOIC`;

  } else if (action === "reopen") {
    document.getElementById("replyTitle").textContent = "Re-open Rejected Request";
    document.getElementById("confirmWarning").style.display = "block";
    document.getElementById("confirmWarningText").textContent =
      "ℹ️ This will change the status back to Pending and notify the user that their request is being reconsidered.";
    document.getElementById("statusMessageInput").value = "Your data request is being reconsidered.";
    document.getElementById("finalStatusInput").value   = "Re-opened — Under Review";
    document.getElementById("replyText").value          =
      `Dear ${d.name},\n\nWe would like to inform you that your previously rejected request (${d.request_id}) is being reconsidered.\n\nWe will update you once a decision has been made.\n\nBest Regards,\nAdmin Team, ELWOIC`;
  }

  closeModal("viewOverlay");
  openModal("replyOverlay");
}

async function sendReply() {
  const d             = current;
  const action        = window.replyAction;
  const msg           = document.getElementById("replyText").value.trim();
  const statusMsg     = document.getElementById("statusMessageInput").value.trim();
  const finalStatus   = document.getElementById("finalStatusInput").value.trim();
  const isPending     = document.getElementById("dataPendingCheck").checked;

  let newStatus, themeColor;

  if (action === "approved") {
    newStatus  = isPending ? "approved_pending" : "approved";
    themeColor = isPending ? "#1d4ed8" : "#16a34a";
  } else if (action === "mark_sent") {
    newStatus  = "approved";
    themeColor = "#16a34a";
  } else if (action === "rejected" || action === "reject_from_approved") {
    newStatus  = "rejected";
    themeColor = "#dc2626";
  } else if (action === "reopen") {
    newStatus  = "Pending";
    themeColor = "#d97706";
  }

  // Send email
  try {
    await emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, {
      to_email:       d.email,
      name:           d.name,
      requestId:      d.request_id,
      parameters:     d.parameters,
      type:           d.type,
      message:        msg,
      status_message: statusMsg,
      final_status:   finalStatus,
      theme_color:    themeColor
    });
  } catch (err) {
    showToast("Email failed to send", "error");
    return;
  }

  // Update Supabase
  try {
    await fetch(`${WORKER_URL}/update`, {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ id: d.id, status: newStatus })
    });

    const idx = allData.findIndex(x => x.id == d.id);
    if (idx !== -1) allData[idx].status = newStatus;

    updateStats();
    render();
    closeModal("replyOverlay");
    showToast("Reply sent. Status → " + newStatus, "success");

  } catch (err) {
    showToast("Status update failed", "error");
  }
}

// ── Delete ────────────────────────────────────────────
async function deleteRequest(id) {
  if (!confirm("Permanently delete this request?")) return;
  try {
    await fetch(`${WORKER_URL}/delete`, {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ id })
    });
    allData = allData.filter(x => x.id != id);
    updateStats();
    render();
    showToast("Request deleted", "success");
  } catch (err) {
    showToast("Delete failed", "error");
  }
}

// ── Helpers ───────────────────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add("open"); }
function closeModal(id) { document.getElementById(id).classList.remove("open"); }

function showToast(msg, type = "success") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `toast toast-${type} show`;
  setTimeout(() => t.classList.remove("show"), 3200);
}
</script>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
