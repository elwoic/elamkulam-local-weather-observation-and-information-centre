<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELWOIC Request Admin Login</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: white;
    padding: 30px;
    border-radius: 10px;
    text-align: center;
    width: 300px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

button {
    padding: 10px;
    width: 100%;
    background: #0284c7;
    color: white;
    border: none;
    cursor: pointer;
}

#msg {
    margin-top: 10px;
    font-size: 13px;
    color: red;
}
</style>
</head>

<body>

<div class="box">
    <h3>Request Admin Login</h3>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p id="msg"></p>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script>
// ✅ YOUR CORRECT PROJECT
const firebaseConfig = {
  apiKey: "AIzaSyCCGNGzhBWETU0gyTUeA2wUVnlQbl2-khU",
  authDomain: "data-request-161d5.firebaseapp.com",
  projectId: "data-request-161d5"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function login(){
    let email = document.getElementById("email").value.trim();
    let pass = document.getElementById("password").value.trim();

    if(!email || !pass){
        msg.innerText = "Enter email and password";
        return;
    }

    auth.signInWithEmailAndPassword(email, pass)
    .then(() => {
        // ✅ correct redirect
        window.location.href = "request_admin.html";
    })
    .catch(err => {
        console.log(err.code);

        if(err.code === "auth/user-not-found"){
            msg.innerText = "User not found";
        }
        else if(err.code === "auth/wrong-password"){
            msg.innerText = "Wrong password";
        }
        else{
            msg.innerText = err.message;
        }
    });
}
</script>

</body>
</html>
